<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FitTrack – Ernährung & Training</title>
<!-- PWA-Basics: Beschreibung, Theme-Farbe, Icons, Manifest (wird per JS als Blob gesetzt) -->
<meta name="description" content="FitTrack – dein persönlicher Ernährungs- und Trainings-Tracker. Kalorien, Makros, Workouts, Wasser und Fortschritt – alles lokal in deinem Browser.">
<meta name="theme-color" id="meta-theme" content="#0b0e16">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Cg fill='%23fff'%3E%3Crect x='30' y='45.5' width='40' height='9' rx='4'/%3E%3Crect x='26' y='30' width='9' height='40' rx='4.2'/%3E%3Crect x='65' y='30' width='9' height='40' rx='4.2'/%3E%3Crect x='17' y='36' width='8' height='28' rx='3.8'/%3E%3Crect x='75' y='36' width='8' height='28' rx='3.8'/%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" id="apple-icon">
<link rel="manifest" id="manifest-link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e16;
    --card:rgba(255,255,255,.045); --card-solid:#161b28; --card2:rgba(255,255,255,.07);
    --border:rgba(255,255,255,.09); --border2:rgba(255,255,255,.16);
    --text:#eef1f8; --muted:#8b93a7;
    --accent:#818cf8;
    --grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 55%,#a855f7 100%);
    --green:#34d399; --orange:#fbbf24; --red:#fb7185; --purple:#c084fc; --cyan:#38bdf8;
    --radius:24px;
    --shadow:0 10px 30px -14px rgba(0,0,0,.5);
    --glow:0 8px 22px -8px rgba(99,102,241,.55);
    --hdrbg:rgba(11,14,22,.72); --navbg:rgba(22,27,40,.88);
    --glow1:rgba(139,92,246,.16); --glow2:rgba(56,189,248,.1);
  }
  html[data-theme="light"]{
    --bg:#eef1f7;
    --card:#ffffff; --card-solid:#ffffff; --card2:#edf0f7;
    --border:#e4e8f1; --border2:#d3dae8;
    --text:#171d2e; --muted:#68718a;
    --shadow:0 10px 26px -16px rgba(30,41,80,.25);
    --glow:0 8px 20px -8px rgba(99,102,241,.4);
    --hdrbg:rgba(238,241,247,.8); --navbg:rgba(255,255,255,.92);
    --glow1:rgba(139,92,246,.12); --glow2:rgba(56,189,248,.1);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{background:var(--bg)}
  body{background:var(--bg); color:var(--text); font-family:'Inter','Segoe UI',system-ui,sans-serif; -webkit-tap-highlight-color:transparent; max-width:640px; margin:0 auto; padding-bottom:104px; min-height:100vh}
  body::before{content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:radial-gradient(620px 420px at 88% -6%, var(--glow1), transparent 65%),
               radial-gradient(700px 520px at -12% 22%, var(--glow2), transparent 60%), var(--bg)}
  ::-webkit-scrollbar{width:9px; height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border2); border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  header{position:sticky; top:0; z-index:40; display:flex; justify-content:space-between; align-items:center; padding:14px 18px; background:var(--hdrbg); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-bottom:1px solid var(--border)}
  .logo{font-size:21px; font-weight:800; letter-spacing:-.4px}
  .logo b{background:linear-gradient(90deg,#6366f1,#a855f7,#38bdf8,#8b5cf6,#6366f1); background-size:320% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; animation:logoShift 9s linear infinite}
  header .hdate{color:var(--muted); font-size:12.5px; font-weight:500}
  .tbtn{width:36px; height:36px; border-radius:12px; background:var(--card2); border:1px solid var(--border); color:var(--text); font-size:16px; flex-shrink:0; cursor:pointer}
  main{padding:14px 14px 0}
  h2{font-size:12.5px; margin:22px 6px 10px; text-transform:uppercase; letter-spacing:.9px; color:var(--muted); font-weight:700}
  h3{font-size:15.5px; margin-bottom:8px; font-weight:700; letter-spacing:-.2px}
  .card{background:var(--card); background-image:linear-gradient(180deg, rgba(255,255,255,.035), transparent 36%); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:var(--shadow); transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease}
  .cardhead{display:flex; align-items:center; gap:10px; margin-bottom:12px}
  .cardhead h3{margin:0; flex:1}
  .cicon{width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:17px; background:var(--card2); border:1px solid var(--border); flex-shrink:0}
  .hero{padding:6px 6px 16px}
  .hero .greet{font-size:24px; font-weight:800; letter-spacing:-.5px; margin-bottom:4px}
  .hero .muted{font-size:14px}
  .dot{display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0}
  .muted{color:var(--muted); font-size:13px}
  .row{display:flex; align-items:center; gap:10px}
  .row.between{justify-content:space-between}
  .grow{flex:1}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:10px; font-size:14px; color:var(--text)}
  .btn{background:var(--grad); color:#fff; padding:11px 18px; font-weight:600; border-radius:13px; box-shadow:var(--glow); transition:transform .15s ease, filter .15s ease}
  .btn:hover{filter:brightness(1.09)}
  .btn:active{transform:scale(.97)}
  .btn.full{width:100%; padding:13px}
  .btn.ghost{background:var(--card2); color:var(--text); border:1px solid var(--border); box-shadow:none}
  .btn.danger{background:transparent; color:var(--red); border:1px solid var(--red); box-shadow:none}
  .btn.small{padding:7px 12px; font-size:13px; border-radius:10px}
  .btn.green{background:linear-gradient(135deg,#10b981,#34d399); color:#052e1c; box-shadow:0 8px 20px -8px rgba(16,185,129,.55)}
  .iconbtn{background:var(--card2); border:1px solid var(--border); color:var(--text); width:36px; height:36px; border-radius:12px; font-size:17px; flex-shrink:0; transition:transform .15s}
  .iconbtn:active{transform:scale(.92)}
  input,select,textarea{font-family:inherit; background:var(--card2); border:1px solid var(--border2); color:var(--text); border-radius:12px; padding:11px 13px; font-size:14px; width:100%; transition:border-color .15s, box-shadow .15s}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.25)}
  input[type=number]{-moz-appearance:textfield}
  input::placeholder{color:var(--muted)}
  label{display:block; font-size:12px; color:var(--muted); margin:12px 0 5px; font-weight:600}
  /* Bottom-Navigation */
  nav{position:fixed; bottom:12px; left:50%; transform:translateX(-50%); width:min(612px, calc(100% - 24px)); display:flex; gap:2px; background:var(--navbg); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:999px; padding:6px; box-shadow:var(--shadow); z-index:50}
  nav button{flex:1; background:none; color:var(--muted); padding:8px 0 7px; font-size:10.5px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:4px; border-radius:999px; transition:color .2s, background .2s}
  nav button svg{width:21px; height:21px; fill:none; stroke:currentColor; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; transition:transform .2s}
  nav button.on{color:#fff; background:var(--grad); box-shadow:var(--glow)}
  /* Kalorien-Ring */
  .ringwrap{display:flex; align-items:center; gap:20px}
  .ring{position:relative; width:150px; height:150px; flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring .mid{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
  .ring .mid b{font-size:30px; font-weight:800; letter-spacing:-1px}
  .ring .mid span{font-size:11px; color:var(--muted); font-weight:500}
  .kstats{flex:1; display:flex; flex-direction:column; gap:10px; font-size:13px}
  /* Makro-Balken */
  .macro{margin-top:6px}
  .macro .mtop{display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin-bottom:5px}
  .macro .mtop b{color:var(--text)}
  .macro .bar{height:8px; background:var(--card2); border-radius:5px; overflow:hidden}
  .macro .bar i{display:block; height:100%; border-radius:5px; transition:width .5s ease}
  .g-green{background:linear-gradient(90deg,#10b981,#34d399)}
  .g-orange{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
  .g-purple{background:linear-gradient(90deg,#8b5cf6,#c084fc)}
  .mgrid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px}
  /* Mahlzeiten */
  .meal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px}
  .fooditem{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-top:1px solid var(--border); gap:8px}
  .fooditem:first-of-type{border-top:none}
  .fooditem .del{color:var(--red); background:none; font-size:15px; padding:4px 6px; opacity:.75}
  .fooditem .del:hover{opacity:1}
  .datebar{display:flex; align-items:center; justify-content:space-between; margin:2px 0 14px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:6px 8px; box-shadow:var(--shadow)}
  .datebar b{font-size:15px; letter-spacing:-.2px}
  /* Wochen-Datumsstreifen (Ernährung) */
  .weekstrip{display:flex; gap:6px; margin:0 0 14px}
  .weekstrip button{flex:1; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:8px 0 7px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text); box-shadow:var(--shadow); transition:transform .15s, border-color .2s, background .2s}
  .weekstrip button:active{transform:scale(.94)}
  .weekstrip .wd{font-size:9.5px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.4px}
  .weekstrip .dn{font-size:14px; font-weight:700; letter-spacing:-.2px}
  .weekstrip .wdot{width:6px; height:6px; border-radius:50%; border:1.5px solid var(--border2); background:transparent}
  .weekstrip .wdot.log{background:var(--green); border-color:transparent}
  .weekstrip .wdot.over{background:var(--red); border-color:transparent}
  .weekstrip button.tdy{border-color:var(--accent)}
  .weekstrip button.sel{background:var(--grad); border-color:transparent; color:#fff; box-shadow:var(--glow)}
  .weekstrip button.sel .wd{color:rgba(255,255,255,.85)}
  .weekstrip button.sel .wdot{border-color:rgba(255,255,255,.7)}
  .weekstrip button.sel .wdot.log, .weekstrip button.sel .wdot.over{background:#fff; border-color:transparent}
  .weekstrip button.fut{opacity:.45}
  @media (hover:hover){ .weekstrip button:not(.sel):hover{border-color:var(--accent)} }
  /* Zielgewicht (Fortschritt-Tab) */
  .goalbox{margin-top:12px; padding:12px 14px; background:var(--card2); border:1px solid var(--border); border-radius:16px}
  .goalbar{height:8px; background:var(--bg); border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-top:9px}
  .goalbar i{display:block; height:100%; border-radius:6px; background:var(--grad); transition:width .5s ease}
  /* Chips */
  .chips{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px}
  .chip{background:var(--card2); border:1px solid var(--border); color:var(--muted); padding:7px 14px; border-radius:20px; font-size:13px; font-weight:500; transition:.2s}
  .chip.on{background:var(--grad); border-color:transparent; color:#fff; box-shadow:var(--glow)}
  /* Subtabs */
  .subtabs{display:flex; background:var(--card); border:1px solid var(--border); border-radius:15px; padding:5px; margin:2px 0 16px; box-shadow:var(--shadow)}
  .subtabs button{flex:1; background:none; color:var(--muted); padding:9px 4px; font-size:13px; font-weight:600; border-radius:11px; transition:.2s}
  .subtabs button.on{background:var(--grad); color:#fff; box-shadow:var(--glow)}
  /* Listen */
  .listitem{display:flex; justify-content:space-between; align-items:center; padding:13px 15px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:9px; gap:10px; box-shadow:var(--shadow); transition:transform .15s}
  .listitem:active{transform:scale(.985)}
  .listitem .info b{font-size:14px; display:block}
  .listitem .info span{font-size:12px; color:var(--muted)}
  /* Modal */
  .modal-bg{position:fixed; inset:0; background:rgba(5,8,15,.6); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); z-index:100; display:none; align-items:flex-end; justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:var(--card-solid); width:100%; max-width:640px; max-height:88vh; overflow-y:auto; border-radius:26px 26px 0 0; padding:14px 18px 30px; border:1px solid var(--border); border-bottom:none; animation:slideUp .42s cubic-bezier(.3,1.25,.4,1)}
  .modal::before{content:""; display:block; width:44px; height:5px; border-radius:3px; background:var(--border2); margin:0 auto 14px}
  .modal h3{font-size:17px; margin-bottom:12px}
  .mclose{float:right; background:none; color:var(--muted); font-size:19px; padding:2px 6px}
  @keyframes slideUp{from{transform:translateY(40px); opacity:0} to{transform:none; opacity:1}}
  /* Sätze-Tabelle */
  .setrow{display:grid; grid-template-columns:26px 1fr 1fr 38px 30px; gap:8px; align-items:center; margin-bottom:7px}
  .setrow .num{color:var(--muted); font-size:13px; text-align:center; font-weight:600}
  .setrow input{text-align:center; padding:9px 6px; font-weight:600}
  .setrow .chk{width:38px; height:38px; border-radius:11px; background:var(--card2); border:1px solid var(--border2); color:var(--muted); font-size:15px; transition:.18s}
  .setrow.done .chk{background:linear-gradient(135deg,#10b981,#34d399); border-color:transparent; color:#052e1c; box-shadow:0 4px 14px -4px rgba(16,185,129,.6)}
  .setrow.done input{border-color:rgba(52,211,153,.5)}
  .aw-ex{margin-bottom:16px}
  .aw-ex .hint{font-size:12px; color:var(--muted); margin-bottom:6px}
  /* Aktives Workout Leiste */
  #aw-bar{position:fixed; bottom:86px; left:50%; transform:translateX(-50%); width:min(612px, calc(100% - 24px)); background:var(--grad); color:#fff; padding:12px 18px; border-radius:16px; display:none; justify-content:space-between; align-items:center; z-index:49; cursor:pointer; box-shadow:var(--glow); font-size:14px}
  #aw-bar.show{display:flex}
  /* Pausen-Timer (Rest-Timer) */
  #rest-bar{position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); width:min(612px, calc(100% - 24px)); background:var(--card-solid); border:1px solid var(--border2); border-radius:18px; padding:12px 16px; display:none; align-items:center; gap:12px; z-index:95; box-shadow:var(--shadowh); opacity:0; transition:opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1)}
  #rest-bar.show{display:flex; opacity:1; transform:translateX(-50%) translateY(0)}
  #rest-bar.done{border-color:var(--green)}
  #rest-bar .rlabel{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.6px}
  #rest-bar .rtime{font-size:26px; font-weight:800; letter-spacing:-.5px; font-variant-numeric:tabular-nums; min-width:74px; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent}
  #rest-bar .rprog{flex:1; height:6px; background:var(--card2); border-radius:4px; overflow:hidden}
  #rest-bar .rprog i{display:block; height:100%; border-radius:4px; background:var(--grad); transition:width .95s linear}
  #rest-bar .radj{width:44px; height:38px; border-radius:11px; background:var(--card2); border:1px solid var(--border); color:var(--text); font-size:12px; font-weight:700; flex-shrink:0}
  #rest-bar .rskip{height:38px; padding:0 14px; border-radius:11px; background:var(--grad); color:#fff; font-size:13px; font-weight:600; flex-shrink:0; box-shadow:var(--glow)}
  /* Pausen-Chips im aktiven Workout */
  .restpick{display:flex; align-items:center; gap:7px; flex-wrap:wrap; justify-content:center; margin-bottom:14px}
  .restpick .rc{background:var(--card2); border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:16px; font-size:12.5px; font-weight:600; transition:.2s}
  .restpick .rc.on{background:var(--grad); border-color:transparent; color:#fff; box-shadow:var(--glow)}
  /* Muskel-Balance (Fortschritt-Tab) */
  .mbrow{display:flex; align-items:center; gap:10px; margin-top:9px}
  .mbrow .mbl{width:82px; flex-shrink:0; font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .mbrow .mbtrack{flex:1; height:10px; background:var(--card2); border:1px solid var(--border); border-radius:6px; overflow:hidden}
  .mbrow .mbfill{height:100%; border-radius:6px; background:var(--grad); transition:width .6s ease}
  .mbrow .mbv{width:74px; flex-shrink:0; text-align:right; font-size:11.5px; color:var(--muted)}
  /* Scheiben-Rechner (Langhantel) */
  .platewrap{display:flex; align-items:center; justify-content:center; gap:3px; min-height:96px; margin-top:12px}
  .platewrap .pbar{width:44px; height:10px; border-radius:5px; background:var(--muted); opacity:.55; flex-shrink:0}
  .platewrap .plate{width:15px; border-radius:4px; flex-shrink:0; box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.28)}
  /* Overlay-Ansicht (aktives Workout) */
  .overlay{position:fixed; inset:0; background:var(--bg); z-index:90; display:none; overflow-y:auto; max-width:640px; margin:0 auto; padding:16px 14px 40px}
  .overlay.open{display:block}
  /* Toast */
  #toast{position:fixed; bottom:104px; left:50%; transform:translateX(-50%) translateY(10px) scale(.94); background:var(--card-solid); border:1px solid var(--border2); color:var(--text); padding:12px 22px; border-radius:14px; font-size:14px; font-weight:500; z-index:200; opacity:0; transition:opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1); pointer-events:none; max-width:90%; text-align:center; box-shadow:var(--shadow)}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0) scale(1); pointer-events:auto}
  #toast .undo{background:none; border:none; color:var(--accent); font-weight:700; font-size:13.5px; cursor:pointer; padding:2px 4px; margin-left:6px}
  details.sess{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:9px; padding:0 15px; box-shadow:var(--shadow)}
  details.sess summary{padding:12px 0; cursor:pointer; list-style:none; display:flex; justify-content:space-between; align-items:center}
  details.sess summary::-webkit-details-marker{display:none}
  details.sess .body{padding:4px 0 12px; border-top:1px solid var(--border)}
  .sexc{margin:8px 0}
  .sexc b{font-size:13px}
  .sexc .st{font-size:12px; color:var(--muted)}
  .water{display:flex; gap:7px; flex-wrap:wrap; margin-top:10px}
  .glass{width:33px; height:41px; border-radius:8px 8px 12px 12px; border:1.5px solid var(--border2); background:var(--card2); cursor:pointer; transition:.2s}
  .glass.full{background:linear-gradient(180deg,#38bdf8,#2563eb); border-color:transparent; box-shadow:0 5px 14px -5px rgba(56,189,248,.55); transform:translateY(-2px)}
  .statgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px}
  .stat{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:15px 12px; text-align:center; box-shadow:var(--shadow); transition:transform .15s}
  .stat:active{transform:scale(.97)}
  .stat b{font-size:23px; display:block; font-weight:800; letter-spacing:-.5px; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent}
  .stat span{font-size:11px; color:var(--muted)}
  .pick-item{padding:12px 6px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; justify-content:space-between; gap:8px; border-radius:10px; transition:background .15s}
  .pick-item:hover{background:var(--card2)}
  .pick-item .sub{font-size:12px; color:var(--muted)}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:22px 0}
  /* Schönere Leerzustände */
  .emptybox{display:flex; flex-direction:column; align-items:center; gap:5px; text-align:center; padding:26px 14px; margin:6px 0; border:1.5px dashed var(--border2); border-radius:16px}

  /* Schnellaktionen am Dashboard */

  .btn:not(.ghost):not(.danger):hover::after{left:135%}
  h2::before{content:""; display:inline-block; width:15px; height:3px; border-radius:2px; background:var(--grad); margin-right:7px; vertical-align:2px}

/* ---------- Hilfsfunktionen ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function num(v){ const n = parseFloat(String(v).replace(",",".")); return isNaN(n)?0:n; }
function r0(x){ return Math.round(x); }
function r1(x){ return Math.round(x*10)/10; }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dateStr(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function addDays(ds, n){ const d = new Date(ds+"T12:00:00"); d.setDate(d.getDate()+n); return dateStr(d); }
function fmtDate(ds){
  const d = new Date(ds+"T12:00:00");
  const wd = ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
  if(ds===todayStr()) return "Heute";
  if(ds===addDays(todayStr(),-1)) return "Gestern";
  if(ds===addDays(todayStr(),1)) return "Morgen";
  return wd+", "+d.getDate()+"."+(d.getMonth()+1)+"."+d.getFullYear();
}
function countUp(el, target, dur){
  if(!el) return;
  if(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches){ el.textContent = target; return; }
  dur = dur || 750;
  const start = performance.now();
  (function tick(now){
    const p = Math.min(1, (now-start)/dur), e = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(target*e);
    if(p<1) requestAnimationFrame(tick);
  })(performance.now());
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2200);
}
function allExercises(){ return EXERCISE_DB.concat(state.customExercises); }
function getExercise(id){ return allExercises().find(e=>e.id===id); }
function getDay(ds){
  if(!state.diary[ds]) state.diary[ds] = {meals:{breakfast:[],lunch:[],dinner:[],snack:[]}, water:0, steps:0, activities:[]};
  const d = state.diary[ds];
  if(!d.meals) d.meals = {breakfast:[],lunch:[],dinner:[],snack:[]};
  for(const k of Object.keys(MEALS)) if(!d.meals[k]) d.meals[k]=[];
  if(!d.activities) d.activities=[];
  return d;
}
function entryKcal(e){ return e.kcal * e.grams / 100; }
function dayTotals(ds){
  const d = getDay(ds);
  let kcal=0,p=0,c=0,f=0;
  for(const m of Object.keys(MEALS)) for(const e of d.meals[m]){
    kcal += entryKcal(e); p += e.p*e.grams/100; c += e.c*e.grams/100; f += e.f*e.grams/100;
  }
  let burned = (d.steps||0)*KCAL_PER_STEP;
  for(const a of d.activities) burned += a.kcal;
  return {kcal,p,c,f,burned};
}
function macroTargets(){
  const t = state.profile.kcalTarget, m = state.profile.macro;
  return {p: t*m.p/100/4, c: t*m.c/100/4, f: t*m.f/100/9};
}

/* ---------- Streak & Wochenrückblick (rein abgeleitet, keine neuen Speicherdaten) ---------- */
function hasEntriesOn(ds){
  const d = state.diary[ds];
  if(d){
    if(d.meals) for(const k of Object.keys(d.meals)) if(d.meals[k] && d.meals[k].length) return true;
    if(d.water>0 || d.steps>0 || (d.activities && d.activities.length)) return true;
  }
  return state.sessions.some(s=>s.date===ds);
}
function loggingStreak(){
  let ds = todayStr(), n = 0;
  if(!hasEntriesOn(ds)) ds = addDays(ds,-1);   // heute zählt erst nach dem ersten Eintrag, bricht den Streak aber nicht
  while(hasEntriesOn(ds)){ n++; ds = addDays(ds,-1); }
  return n;
}
function weekStats(monday){
  const end = addDays(monday,6);
  let kcal=0, days=0, water=0, workouts=0, vol=0;
  for(let i=0;i<7;i++){
    const ds = addDays(monday,i);
    if(ds>todayStr()) break;
    if(state.diary[ds]){
      const t = dayTotals(ds);
      if(t.kcal>0){ kcal += t.kcal; days++; }
      water += state.diary[ds].water||0;
    }
  }
  for(const s of state.sessions) if(s.date>=monday && s.date<=end){ workouts++; vol += sessionVolume(s); }
  return {avgKcal: days ? kcal/days : 0, days, water, workouts, vol};
}
function trendMark(cur, prev, goodDown){
  const diff = cur - prev;
  if(Math.abs(diff) < 0.01) return '<span class="muted" style="margin-left:5px">＝</span>';
  const up = diff > 0;
  const good = goodDown ? !up : up;
  return '<span style="margin-left:5px; color:'+(good?"var(--green)":"var(--red)")+'">'+(up?"▲":"▼")+'</span>';
}

/* ---------- Erfolgs-Badges (abgeleitet aus bestehenden Daten) ---------- */
function badgeList(){
  const streak = loggingStreak();
  const wo = state.sessions.length;
  let vol = 0; for(const s of state.sessions) vol += sessionVolume(s);
  let meals = 0, waterDays = 0, steps10k = 0;
  for(const ds of Object.keys(state.diary)){
    const d = state.diary[ds];
    if(d.meals) for(const k of Object.keys(d.meals)) meals += (d.meals[k]||[]).length;
    if((d.water||0) >= state.profile.waterTarget) waterDays++;
    if((d.steps||0) >= 10000) steps10k = 1;
  }
  const weekCnt = {};
  for(const s of state.sessions){ const m = mondayOf(s.date); weekCnt[m] = (weekCnt[m]||0)+1; }
  const bestWeek = Object.keys(weekCnt).length ? Math.max(...Object.values(weekCnt)) : 0;
  const B = (id,icon,name,desc,cur,goal)=>({id,icon,name,desc,earned:cur>=goal,cur:Math.min(cur,goal),goal});
  return [
    B("streak3","🔥","Dranbleiber","3-Tage-Streak",streak,3),
    B("streak7","⚡","Wochen-Held","7-Tage-Streak",streak,7),
    B("streak30","🏆","Eisern","30-Tage-Streak",streak,30),
    B("wo1","🏋️","Los geht's","Erstes Workout",wo,1),
    B("wo10","💪","Zehnkämpfer","10 Workouts",wo,10),
    B("wo50","🥇","Gym-Veteran","50 Workouts",wo,50),
    B("week4","📅","Starke Woche","4 Workouts in einer Woche",bestWeek,4),
    B("vol10k","🚀","Tonnenschwer","10.000 kg Trainingsvolumen",vol,10000),
    B("water7","💧","Wasserfest","Wasserziel an 7 Tagen erreicht",waterDays,7),
    B("steps10k","👟","Stadtwanderer","10.000 Schritte an einem Tag",steps10k,1),
    B("meals50","🍎","Tagebuch-Profi","50 Mahlzeiten geloggt",meals,50),
    B("weigh5","⚖️","Messbar besser","5 Gewichts-Einträge",state.weights.length,5)
  ];
}
function checkNewBadges(){
  try{
    if(!Array.isArray(state.badgesSeen)) state.badgesSeen = [];
    const fresh = badgeList().filter(b=>b.earned && !state.badgesSeen.includes(b.id));
    if(fresh.length){
      for(const b of fresh) state.badgesSeen.push(b.id);
      localStorage.setItem(STORE_KEY, JSON.stringify(state));   // direkt, kein save() (Rekursion)
      toast("🏅 Neuer Erfolg: "+fresh[0].name+(fresh.length>1?" +"+(fresh.length-1)+" weitere":"")+"!");
    }
  }catch(e){ console.warn("Badge-Check fehlgeschlagen", e); }
}

/* ---------- Navigation ---------- */
let currentTab = "dashboard";
function switchTab(tab){
  currentTab = tab;
  document.body.setAttribute("data-tab", tab); // v2-Design-Hook (nur CSS-Steuerung)
  for(const v of ["dashboard","nutrition","training","progress","profile"]){
    document.getElementById("view-"+v).style.display = v===tab ? "" : "none";
    document.getElementById("nav-"+v).classList.toggle("on", v===tab);
    document.getElementById("nav-"+v).setAttribute("aria-current", v===tab ? "page" : "false");
  }
  renderTab(tab);
  const el = document.getElementById("view-"+tab);
  clearTimeout(el._fadeT);
  el.classList.remove("fade"); void el.offsetWidth; el.classList.add("fade");
  el._fadeT = setTimeout(()=>el.classList.remove("fade"), 900);   // Stagger nur beim Tab-Wechsel, nicht bei jedem Re-Render
  window.scrollTo(0,0);
}
function renderTab(tab){
  if(tab==="dashboard") renderDashboard();
  if(tab==="nutrition") renderNutrition();
  if(tab==="training") renderTraining();
  if(tab==="progress") renderProgress();
  if(tab==="profile") renderProfile();
}

/* ---------- Modal (mit Fokus-Management für Tastatur & Screenreader) ---------- */
let _modalPrev = null;
function openModal(html){
  _modalPrev = document.activeElement;
  const m = document.getElementById("modal");
  m.innerHTML = '<button class="mclose" onclick="closeModal()" aria-label="Dialog schließen">✕</button>' + html;
  document.getElementById("modal-bg").classList.add("open");
  const f = m.querySelector("input, select, textarea, button:not(.mclose)");
  (f||m).focus({preventScroll:true});
}
function closeModal(){
  document.getElementById("modal-bg").classList.remove("open");
  stopBarcodeCamera();
  if(_modalPrev && document.contains(_modalPrev) && _modalPrev.focus) _modalPrev.focus({preventScroll:true});
  _modalPrev = null;
}
// ESC schließt das Modal, Tab bleibt im Dialog (Fokus-Falle)
document.addEventListener("keydown", e=>{
  const bg = document.getElementById("modal-bg");
  if(!bg || !bg.classList.contains("open")) return;
  if(e.key==="Escape"){ e.preventDefault(); closeModal(); return; }
  if(e.key==="Tab"){
    const els = Array.from(document.getElementById("modal")
      .querySelectorAll('button, input, select, textarea, [tabindex]:not([tabindex="-1"])'))
      .filter(x=>!x.disabled && x.offsetParent!==null);
    if(!els.length) return;
    const first = els[0], last = els[els.length-1];
    if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
  }
});

function macroBar(label, val, target){

    + '<div class="bar"><i class="'+cls+'" style="width:'+pct+'%"></i></div></div>';
}
function renderWaterGlasses(ds){
  const d = getDay(ds);

    const full = i<=(d.water||0);
    h += '<div class="glass'+(full?" full":"")+'" role="button" tabindex="0" aria-pressed="'+full+'" aria-label="Wasserglas '+i+' von '+n+'" onclick="setWater(\''+ds+'\','+i+')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();setWater(\''+ds+'\','+i+')}"></div>';

/* ---------- Wochen-Datumsstreifen: 7 Tage antippen statt blättern ---------- */
function weekStripHtml(ds){
  const mon = mondayOf(ds), today = todayStr(), target = state.profile.kcalTarget;
  const WD = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  let h = '<div class="weekstrip" aria-label="Tage dieser Woche">';
  for(let i=0;i<7;i++){
    const wds = addDays(mon,i);
    // bewusst ohne getDay(): kein leerer Tag im Tagebuch anlegen
    const dd = state.diary[wds];
    let k = 0, has = false;
    if(dd && dd.meals) for(const m of Object.keys(dd.meals)) for(const e of (dd.meals[m]||[])){ k += e.kcal*e.grams/100; has = true; }
    const dot = !has ? "" : (k > target ? " over" : " log");
    const cls = (wds===ds ? " sel" : "") + (wds===today ? " tdy" : "") + (wds>today ? " fut" : "");
    h += '<button class="'+cls.trim()+'" onclick="gotoDate(\''+wds+'\')" aria-label="'+fmtDate(wds)+(has?', '+r0(k)+' kcal geloggt':'')+'" '+(wds===ds?'aria-current="date"':'')+'>'
      + '<span class="wd">'+WD[i]+'</span><span class="dn">'+parseInt(wds.slice(8),10)+'</span><span class="wdot'+dot+'"></span></button>';
  }
  return h + '</div>';
}

/* ---------- Mahlzeit vom Vortag übernehmen ---------- */
function yesterdayMeal(ds, mk){
  const prev = state.diary[addDays(ds,-1)];   // bewusst ohne getDay(): nichts anlegen
  return (prev && prev.meals && prev.meals[mk]) ? prev.meals[mk] : [];
}
function copyYesterdayMeal(mk){
  const ds = nutriDate, src = yesterdayMeal(ds, mk);
  if(!src.length){ toast("Am Vortag war "+MEALS[mk]+" leer."); return; }
  const list = getDay(ds).meals[mk];
  const added = src.map(e=>Object.assign({}, e, {id:uid()}));
  for(const e of added) list.push(e);
  save(); renderNutrition();
  toastUndo(added.length+(added.length===1?" Eintrag":" Einträge")+" vom Vortag übernommen", function(){
    const l = getDay(ds).meals[mk];
    for(const a of added){ const i = l.findIndex(x=>x.id===a.id); if(i>=0) l.splice(i,1); }
    save();
    if(currentTab==="nutrition") renderNutrition();
    if(currentTab==="dashboard") renderDashboard();
  });
}
function deleteFoodEntry(meal, id){
  const ds = nutriDate, list = getDay(ds).meals[meal];
  const idx = list.findIndex(e=>e.id===id);

/* ---------- Online-Produktsuche (Open Food Facts, u. a. Billa/Clever/S-Budget/Hofer/Lidl) ---------- */
let onlineTimer = null, onlineSeq = 0;
function scheduleOnlineSearch(){
  const q = (foodModal.q||"").trim();
  const box = document.getElementById("online-results");
  if(onlineTimer){ clearTimeout(onlineTimer); onlineTimer = null; }
  if(!box) return;
  if(q.length<3 || (foodModal.cat!=="all" && foodModal.cat!=="markt")){
    box.innerHTML = ""; foodModal.online = [];
    return;
  }
  box.innerHTML = '<p class="empty">🌐 Online-Suche läuft…</p>';
  onlineTimer = setTimeout(()=>runOnlineSearch(q), 650);
}
const STORE_BRANDS = ["billa","clever","spar","s-budget","interspar","hofer","fairhof","lidl","milbona","dulano","milfina","penny","aldi","schärdinger","nöm"];
async function runOnlineSearch(q){
  const seq = ++onlineSeq;
  try{
    const tokens = q.toLowerCase().split(/\s+/).filter(Boolean);
    const brands = tokens.filter(t=>STORE_BRANDS.includes(t));
    const terms = tokens.filter(t=>!STORE_BRANDS.includes(t)).join(" ");
    let url;
    if(terms){
      // Freitext-Suche; bei Markenangabe mehr Ergebnisse holen und unten filtern
      url = "https://at.openfoodfacts.org/cgi/search.pl?action=process&json=1&search_simple=1"
        + "&fields=code,product_name,brands,nutriments&page_size="+(brands.length?100:30)
        + "&search_terms="+encodeURIComponent(terms);
    } else if(brands.length){
      // reine Marken-Suche (z. B. "clever") über die v2-API
      url = "https://at.openfoodfacts.org/api/v2/search?brands_tags="+encodeURIComponent(brands[0])
        + "&fields=code,product_name,brands,nutriments&page_size=30";
    } else { return; }
    const res = await fetch(url);
    const data = await res.json();
    if(seq!==onlineSeq) return;   // veraltete Antwort verwerfen
    const box = document.getElementById("online-results");
    if(!box) return;
    let items = (data.products||[]).map(p=>{
      const n = p.nutriments||{};
      return {name:p.product_name||"", brand:p.brands||"", kcal:num(n["energy-kcal_100g"]),
              p:num(n.proteins_100g), c:num(n.carbohydrates_100g), f:num(n.fat_100g), barcode:p.code||""};
    }).filter(x=>x.name && x.kcal>0);
    if(brands.length) items = items.filter(x=>{ const b=(x.brand||"").toLowerCase(); return brands.every(t=>b.includes(t)); });
    items = items.slice(0,15);
    foodModal.online = items;
    box.innerHTML = items.length
      ? '<div class="muted" style="margin:12px 0 4px; font-weight:600; font-size:12px">🌐 Online gefunden (Open Food Facts)</div>'
        + items.map((x,i)=>'<div class="pick-item" onclick="selectOnlineResult('+i+')"><div><b>'+esc(x.name)+'</b>'
          + '<div class="sub">'+(x.brand?esc(x.brand)+' · ':'')+r0(x.kcal)+' kcal · P '+r1(x.p)+' · K '+r1(x.c)+' · F '+r1(x.f)+' (pro 100 g)</div></div>'
          + '<span class="muted">＋</span></div>').join("")
      : '<p class="empty">🌐 Online nichts gefunden – anderen Suchbegriff probieren.</p>';
  }catch(e){
    if(seq!==onlineSeq) return;
    foodModal.online = [];
    const box = document.getElementById("online-results");
    if(box) box.innerHTML = '<p class="empty">🌐 Online-Suche gerade nicht erreichbar – kurz warten und weitertippen (oder Internetverbindung prüfen).</p>';
  }
}

/* ---------- Barcode ---------- */
let bcStream = null, bcTimer = null;
async function lookupBarcode(code){
  code = code || (document.getElementById("barcode-in")||{}).value || "";
  code = code.trim();
  const out = document.getElementById("barcode-result");
  if(!code){ if(out) out.innerHTML = '<p class="empty">Bitte Barcode eingeben.</p>'; return; }

  // erst in eigenen Lebensmitteln suchen
  const own = state.customFoods.find(f=>f.barcode===code);
  if(own){ foodModal.selected = Object.assign({}, own); renderFoodTabBody(); return; }

  if(out) out.innerHTML = '<p class="muted">Suche in Open Food Facts…</p>';
  try{
    const res = await fetch("https://world.openfoodfacts.org/api/v0/product/"+encodeURIComponent(code)+".json");
    const data = await res.json();
    if(data.status===1 && data.product){
      const p = data.product, n = p.nutriments||{};
      const kcal = num(n["energy-kcal_100g"]);
      if(kcal<=0){ if(out) out.innerHTML = '<p class="empty">Produkt gefunden, aber ohne Nährwertangaben.</p>'; return; }
      foodModal.selected = {name: p.product_name || ("Produkt "+code), brand: p.brands||"",
        kcal, p:num(n.proteins_100g), c:num(n.carbohydrates_100g), f:num(n.fat_100g), barcode:code};
      stopBarcodeCamera();
      renderFoodTabBody();
    } else {
      if(out) out.innerHTML = '<p class="empty">Kein Produkt mit diesem Barcode gefunden. Lege es unter „Eigenes“ (mit Barcode) an.</p>';
    }
  }catch(e){
    if(out) out.innerHTML = '<p class="empty">Suche fehlgeschlagen – besteht eine Internetverbindung?</p>';
  }
}
async function startBarcodeCamera(){
  try{
    const video = document.getElementById("bc-video");
    bcStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    video.srcObject = bcStream; video.style.display = "block";
    await video.play();
    const detector = new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e"]});
    bcTimer = setInterval(async ()=>{
      try{
        const codes = await detector.detect(video);
        if(codes.length){
          const val = codes[0].rawValue;
          const inp = document.getElementById("barcode-in");
          if(inp) inp.value = val;
          stopBarcodeCamera();
          lookupBarcode(val);
        }
      }catch(e){}
    }, 400);
  }catch(e){ toast("Kamera nicht verfügbar"); }
}
function stopBarcodeCamera(){
  if(bcTimer){ clearInterval(bcTimer); bcTimer = null; }
  if(bcStream){ for(const t of bcStream.getTracks()) t.stop(); bcStream = null; }
  const v = document.getElementById("bc-video");
  if(v){ v.style.display = "none"; v.srcObject = null; }
}

  switch(goal){

    case "ausdauer":     return {p:20,c:55,f:25};
    case "abnehmen":     return {p:35,c:35,f:30};
    default:             return {p:25,c:45,f:30};

}

let aiCoach = null;

function nextMealSlot(ds){
  const d = getDay(ds);
  const hr = new Date().getHours();
  let order;
  if(ds!==todayStr() || hr<10) order = ["breakfast","lunch","dinner","snack"];
  else if(hr<14) order = ["lunch","dinner","snack"];
  else if(hr<20) order = ["dinner","snack"];
  else order = ["snack"];
  for(const m of order) if(!d.meals[m].length) return m;
  return "snack";
}
function coachSuggestions(slot, budget, goal){
  const split = goalMacroSplit(goal);
  const tp = budget*split.p/100/4, tc = budget*split.c/100/4, tf = budget*split.f/100/9;
  const wP = (goal==="muskelaufbau"||goal==="abnehmen") ? 2.2 : 1.2;
  const wC = goal==="ausdauer" ? 1.8 : 1;
  const list = [];
  for(const tpl of MEAL_TEMPLATES){
    if(!tpl.meal.includes(slot)) continue;
    const foods = tpl.items.map(it=>{ const f = FOOD_CATALOG.find(x=>x.name===it[0]); return f ? {f, g:it[1]} : null; });
    if(foods.some(x=>!x)) continue;
    let baseKcal = 0;
    for(const x of foods) baseKcal += x.f.kcal*x.g/100;
    const scale = Math.max(0.55, Math.min(1.7, budget/Math.max(baseKcal,1)));
    let sk=0, sp=0, sc=0, sf=0;
    const items = foods.map(x=>{
      const g = Math.max(5, Math.round(x.g*scale/5)*5);
      sk += x.f.kcal*g/100; sp += x.f.p*g/100; sc += x.f.c*g/100; sf += x.f.f*g/100;
      return {name:x.f.name, brand:x.f.brand||"", kcal:x.f.kcal, p:x.f.p, c:x.f.c, f:x.f.f, grams:g};
    });
    let score = 0;
    score -= Math.abs(sk-budget)/Math.max(budget,1)*1.5;
    score -= Math.abs(sp-tp)/Math.max(tp,1)*wP;
    score -= Math.abs(sc-tc)/Math.max(tc,1)*wC;
    score -= Math.abs(sf-tf)/Math.max(tf,1);
    if((tpl.tags||[]).includes(goal)) score += 0.5;
    score += Math.random()*0.15;   // leichte Varianz für Abwechslung
    list.push({title:tpl.name, items, kcal:sk, p:sp, c:sc, f:sf, score});
  }
  return list.sort((a,b)=>b.score-a.score);
}
function openCoach(ds){
  ds = ds || todayStr();
  const goal = state.profile.goal || "halten";
  const slot = nextMealSlot(ds);
  const t = dayTotals(ds);
  const effTarget = state.profile.kcalTarget + t.burned;
  const remaining = effTarget - t.kcal;
  const share = {breakfast:0.25, lunch:0.35, dinner:0.30, snack:0.15}[slot];
  let budget = Math.min(Math.max(remaining, 0), effTarget*share*1.15);
  if(budget < 150) budget = 150;
  aiCoach = {ds, slot, goal, budget:r0(budget), remaining:r0(remaining), all:coachSuggestions(slot, budget, goal), offset:0, view:"meal", plan:null};
  renderCoach();
}

function fmtEur(x){ return x.toFixed(2).replace(".", ",")+" €"; }

function buildShoppingPlan(budgetEur, veg){
  const goal = state.profile.goal || "halten";
  const weeklyKcal = state.profile.kcalTarget*7;
  const weeklyP = macroTargets().p*7;
  const w = {muskelaufbau:{p:3,k:1}, abnehmen:{p:3,k:0.4}, ausdauer:{p:1,k:2.4}, halten:{p:1.6,k:1.4}}[goal];
  const pool = SHOP_DB.filter(i=>!veg || i.veg);
  const basket = {};
  let cost=0, kcal=0, prot=0;
  const add = it=>{ basket[it.name]=(basket[it.name]||0)+1; cost+=it.price; kcal+=it.kcal; prot+=it.prot; };
  // 1) Grundausstattung
  for(const it of pool.filter(i=>i.base)) if(cost+it.price<=budgetEur) add(it);
  // 2) Budget zielgerichtet auffüllen (Greedy nach Nährwert pro Euro)
  let guard = 0;
  while(guard++ < 300){
    if(kcal >= weeklyKcal*1.08 && prot >= weeklyP) break;
    // Kalorien-Deckel gilt nicht für magere, effiziente Proteinquellen, solange Protein fehlt
    const cands = pool.filter(it=>(basket[it.name]||0)<it.max && cost+it.price<=budgetEur
      && (kcal+it.kcal<=weeklyKcal*1.15
          || (prot<weeklyP && kcal<weeklyKcal*1.35 && it.prot/it.price>=15 && it.kcal/Math.max(it.prot,1)<=12)));
    if(!cands.length) break;
    let best=null, bs=0;
    for(const it of cands){
      const needP = Math.max(0, 1-prot/weeklyP), needK = Math.max(0, 1-kcal/weeklyKcal);
      let s = w.p*(it.prot/it.price)*needP*0.02 + w.k*(it.kcal/it.price)*needK*0.001;
      if(goal==="abnehmen" && it.cat==="Obst & Gemüse" && needK>0) s += 0.3;
      if((basket[it.name]||0)>0) s *= 0.55;   // Abwechslung fördern
      if(s>bs){ bs=s; best=it; }
    }
    if(!best || bs<=0) break;
    add(best);
  }
  const items = Object.entries(basket).map(([n,q])=>({it:SHOP_DB.find(x=>x.name===n), qty:q}));
  return {items, cost, kcal, prot, weeklyKcal, weeklyP, budget:budgetEur, goal};
}

/* ---------- Übungs-Fortschritt & persönliche Rekorde ---------- */
function e1rm(kg, reps){ if(!kg || !reps) return 0; return reps===1 ? kg : kg*(1+reps/30); }
function exHistory(exId){
  const out = [];
  const sess = state.sessions.slice().sort((a,b)=>a.date.localeCompare(b.date) || (a.start||0)-(b.start||0));
  for(const s of sess){
    const e = s.entries.find(x=>x.exId===exId);
    if(!e || !e.sets.length) continue;
    let bestKg=0, bestReps=0, best1=0, vol=0;
    for(const st of e.sets){
      vol += (st.kg||0)*(st.reps||0);
      const o = e1rm(st.kg||0, st.reps||0);
      if(o>best1) best1 = o;
      if((st.kg||0)>bestKg || ((st.kg||0)===bestKg && (st.reps||0)>bestReps)){ bestKg = st.kg||0; bestReps = st.reps||0; }
    }
    out.push({date:s.date, bestKg, bestReps, e1rm:best1, vol, sets:e.sets});
  }
  return out;
}
function detectPRs(entries){
  const prs = [];
  for(const e of entries){
    const hist = exHistory(e.exId);
    if(!hist.length) continue;
    const prevKg = Math.max(...hist.map(h=>h.bestKg));
    const prev1  = Math.max(...hist.map(h=>h.e1rm));
    if(prevKg<=0) continue;
    let curKg=0, curReps=0, cur1=0;
    for(const st of e.sets){
      const o = e1rm(st.kg||0, st.reps||0);
      if(o>cur1) cur1 = o;
      if((st.kg||0)>curKg){ curKg = st.kg||0; curReps = st.reps||0; }
    }
    if(curKg>prevKg) prs.push(e.name+" "+r1(curKg)+" kg × "+curReps);
    else if(cur1>prev1+0.05) prs.push(e.name+" ≈"+r0(cur1)+" kg (1RM)");
  }
  return prs;
}
function openExerciseDetail(id){
  const e = getExercise(id);
  if(!e) return;
  const hist = exHistory(id);
  let h = '<h3>'+esc(e.name)+'</h3>'
    + '<p class="muted">'+esc(e.muscle)+' · '+esc(e.equip)+'</p>';
  if(hist.length){
    const bk = hist.reduce((a,b)=>(b.bestKg>a.bestKg || (b.bestKg===a.bestKg && b.bestReps>a.bestReps))?b:a);
    const b1 = Math.max(...hist.map(x=>x.e1rm));
    const vol = hist.reduce((s,x)=>s+x.vol,0);
    h += '<div class="statgrid" style="margin:12px 0 0">'
      + '<div class="stat"><b>'+r1(bk.bestKg)+' kg × '+bk.bestReps+'</b><span>🏆 Bester Satz</span></div>'
      + '<div class="stat"><b>'+(b1>0?"≈"+r0(b1)+" kg":"–")+'</b><span>Geschätztes 1RM</span></div>'
      + '<div class="stat"><b>'+hist.length+'</b><span>Einheiten</span></div>'
      + '<div class="stat"><b>'+r0(vol).toLocaleString("de-DE")+' kg</b><span>Gesamtvolumen</span></div></div>';
    const pts = hist.filter(x=>x.e1rm>0).slice(-12).map(x=>({x:x.date, y:r1(x.e1rm)}));
    if(pts.length>=2) h += '<h2 style="margin-top:16px">Kraft-Verlauf <span class="muted" style="font-weight:400; font-size:12px">geschätztes 1RM</span></h2>' + lineChart(pts);
    h += '<h2 style="margin-top:14px">Letzte Einheiten</h2>';
    for(const x of hist.slice(-3).reverse()){
      h += '<div class="sexc" style="padding:7px 0; border-top:1px solid var(--border)"><b style="font-size:13px">'+fmtDate(x.date)+'</b>'
        + '<div class="st muted" style="font-size:13px">'+x.sets.map(st=>r1(st.kg)+" kg × "+st.reps).join("  ·  ")+'</div></div>';
    }

    + (e.custom?'<button class="btn danger full" style="margin-top:10px" onclick="deleteCustomExercise(\''+e.id+'\')">Übung löschen</button>':'');
  openModal(h);
}

  for(const e of s.entries) for(const st of e.sets) v += (st.kg||0)*(st.reps||0);

function lastPerf(exId){
  const sess = state.sessions.slice().sort((a,b)=>b.date.localeCompare(a.date));
  for(const s of sess){
    const e = s.entries.find(x=>x.exId===exId);
    if(e && e.sets.length){
      const best = e.sets.reduce((a,b)=>(b.kg||0)>(a.kg||0)?b:a, e.sets[0]);
      return r1(best.kg)+" kg × "+best.reps+" ("+fmtDate(s.date)+")";
    }

  return null;

  return dateStr(d);

/* ---------- Aktives Workout ---------- */
let awTimer = null;

function startWorkout(plan){
  if(state.active && !confirm("Es läuft bereits ein Workout. Neues starten und das alte verwerfen?")) { openWorkoutOverlay(); return; }
  const entries = [];
  if(plan){
    for(const it of plan.items){
      const e = getExercise(it.exId);
      if(!e) continue;
      const sets = [];
      const lastKg = lastKgFor(it.exId);
      for(let i=0;i<it.sets;i++) sets.push({kg:lastKg, reps:it.reps, done:false});
      entries.push({exId:it.exId, name:e.name, sets});
    }
  }
  state.active = {name: plan?plan.name:"Freies Workout", start: Date.now(), entries};
  save();
  openWorkoutOverlay();
}
function startWorkoutFromPlan(id, isPreset){
  const plan = isPreset ? PRESET_PLANS.find(p=>p.id===id) : state.plans.find(p=>p.id===id);
  if(plan) startWorkout(plan);
}
function lastKgFor(exId){
  const sess = state.sessions.slice().sort((a,b)=>b.date.localeCompare(a.date));
  for(const s of sess){
    const e = s.entries.find(x=>x.exId===exId);
    if(e && e.sets.length) return e.sets[e.sets.length-1].kg || 0;
  }
  return 0;
}
function openWorkoutOverlay(){
  if(!state.active) return;
  document.getElementById("workout-overlay").classList.add("open");
  renderActiveWorkout();
  if(awTimer) clearInterval(awTimer);
  awTimer = setInterval(updateAwTime, 1000);
  updateAwTime();
}

}
function updateAwTime(){
  if(!state.active){ if(awTimer){clearInterval(awTimer); awTimer=null;} return; }
  const sec = Math.floor((Date.now()-state.active.start)/1000);
  const str = Math.floor(sec/60)+":"+String(sec%60).padStart(2,"0");
  const el = document.getElementById("aw-time");
  if(el) el.textContent = str;
  const bar = document.getElementById("aw-bar-time");

}

/* ---------- Pausen-Timer (Rest-Timer) ---------- */
let restTimer = null, restEnd = 0, restTotal = 0;
function setRestSec(sec){
  state.profile.restSec = sec;
  save();
  if(sec === 0) stopRest();
  renderActiveWorkout();
  toast(sec === 0 ? "Pausen-Timer aus" : "Pause: "+sec+" s");
}
function startRest(sec){
  restTotal = sec;
  restEnd = Date.now() + sec*1000;
  const bar = document.getElementById("rest-bar");
  bar.classList.remove("done");
  bar.classList.add("show");
  if(restTimer) clearInterval(restTimer);
  tickRest();
  restTimer = setInterval(tickRest, 250);
}
function tickRest(){
  const bar = document.getElementById("rest-bar");
  const remMs = restEnd - Date.now();
  const rem = Math.max(0, Math.ceil(remMs/1000));
  const tEl = document.getElementById("rest-time");
  if(tEl) tEl.textContent = Math.floor(rem/60)+":"+String(rem%60).padStart(2,"0");
  const pEl = document.getElementById("rest-prog");
  if(pEl) pEl.style.width = (restTotal>0 ? Math.max(0, Math.min(100, remMs/(restTotal*1000)*100)) : 0)+"%";
  if(remMs <= 0){
    clearInterval(restTimer); restTimer = null;
    bar.classList.add("done");
    restBeep();
    if(navigator.vibrate){ try{ navigator.vibrate([120,60,120]); }catch(e){} }
    toast("⏱ Pause vorbei – weiter geht's! 💪");
    setTimeout(()=>{ if(!restTimer) bar.classList.remove("show","done"); }, 2500);
  }
}
function adjustRest(delta){
  if(!restTimer && !document.getElementById("rest-bar").classList.contains("show")) return;
  restEnd += delta*1000;
  restTotal = Math.max(1, restTotal + delta);
  if(restEnd <= Date.now()){ stopRest(true); return; }
  if(!restTimer){ document.getElementById("rest-bar").classList.remove("done"); restTimer = setInterval(tickRest, 250); }
  tickRest();
}
function stopRest(manual){
  if(restTimer){ clearInterval(restTimer); restTimer = null; }
  const bar = document.getElementById("rest-bar");
  if(bar) bar.classList.remove("show","done");
}
function restBeep(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    const ctx = new AC();
    [0, 0.18].forEach((t,i)=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "sine"; o.frequency.value = i ? 1046 : 784;
      o.connect(g); g.connect(ctx.destination);
      const s = ctx.currentTime + t;
      g.gain.setValueAtTime(0.0001, s);
      g.gain.exponentialRampToValueAtTime(0.25, s+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, s+0.15);
      o.start(s); o.stop(s+0.16);
    });
    setTimeout(()=>{ try{ctx.close();}catch(e){} }, 600);
  }catch(e){}
}

/* ---------- Scheiben-Rechner (Langhantel) – rein flüchtig, keine Speicheränderung ---------- */
let plateCalcState = {kg:null, bar:20};
const PLATE_SIZES = [25, 20, 15, 10, 5, 2.5, 1.25];
const PLATE_STYLE = {25:["#ef4444",76], 20:["#3b82f6",76], 15:["#eab308",66], 10:["#22c55e",56], 5:["#e2e8f0",46], 2.5:["#475569",38], 1.25:["#94a3b8",32]};
function fmtKg(v){ return (Math.round(v*100)/100).toLocaleString("de-DE"); }
function plateSplit(total, bar){
  const perSide = (total - bar) / 2;
  const plates = [];
  let rest = perSide;
  if(perSide > 0){
    for(const p of PLATE_SIZES){
      while(rest >= p - 1e-9){ plates.push(p); rest -= p; }
    }
  }
  return {perSide, plates, rest: Math.round(rest*100)/100};
}
function openPlateCalc(){
  // Vorbelegung: schwerster kg-Wert im aktuellen Workout (falls vorhanden)
  if(state.active){
    let mx = 0;
    for(const e of state.active.entries) for(const s of e.sets) if((s.kg||0) > mx) mx = s.kg;
    if(mx > 0) plateCalcState.kg = mx;
  }
  openModal('<h3>🧮 Scheiben-Rechner</h3>'
    + '<p class="muted" style="margin-top:4px">Welche Scheiben musst du pro Seite auf die Langhantel stecken?</p>'
    + '<label>Zielgewicht gesamt (kg)</label><input type="number" inputmode="decimal" id="pc-kg" min="0" step="0.5" value="'+(plateCalcState.kg||"")+'" placeholder="z. B. 60" oninput="updPlateCalc()">'
    + '<label>Stange</label><div class="restpick" style="justify-content:flex-start; margin:2px 0 0">'
    + [10,15,20,25].map(b=>'<button class="rc'+(plateCalcState.bar===b?" on":"")+'" data-bar="'+b+'" onclick="setPlateBar('+b+')">'+b+' kg</button>').join("")
    + '</div><div id="pc-out" aria-live="polite"></div>');

function setPlateBar(b){
  plateCalcState.bar = b;
  document.querySelectorAll("#modal [data-bar]").forEach(el=>el.classList.toggle("on", +el.getAttribute("data-bar")===b));
  updPlateCalc();
}
function updPlateCalc(){
  const out = document.getElementById("pc-out");
  if(!out) return;
  const inp = document.getElementById("pc-kg");
  const kg = num(inp ? inp.value : 0);
  plateCalcState.kg = kg || null;
  if(!(kg > 0)){ out.innerHTML = '<p class="muted" style="margin-top:14px">Gib dein Zielgewicht ein – z. B. 60 kg.</p>'; return; }
  const bar = plateCalcState.bar;
  if(kg < bar){ out.innerHTML = '<p class="muted" style="margin-top:14px">'+fmtKg(kg)+' kg ist leichter als die leere Stange ('+bar+' kg) – nimm eine leichtere Stange oder Kurzhanteln.</p>'; return; }
  const r = plateSplit(kg, bar);
  let h = '<div class="platewrap"><span class="pbar" title="Stange '+bar+' kg"></span>';
  for(const p of r.plates){
    const st = PLATE_STYLE[p] || ["#94a3b8",40];
    h += '<span class="plate" style="background:'+st[0]+'; height:'+st[1]+'px" title="'+fmtKg(p)+' kg"></span>';
  }
  h += '</div>';
  if(!r.plates.length){
    h += '<p class="muted" style="text-align:center; margin-top:8px">Nur die leere Stange – '+fmtKg(bar)+' kg. 💪</p>';
  } else {
    h += '<p style="text-align:center; margin-top:8px"><b>Pro Seite: '+r.plates.map(fmtKg).join(" + ")+' kg</b></p>'
      + '<p class="muted" style="text-align:center; font-size:12.5px; margin-top:4px">Stange '+fmtKg(bar)+' kg + 2 × '+fmtKg(r.perSide - r.rest)+' kg Scheiben</p>';
  }
  if(r.rest > 0){
    const achievable = bar + 2*(r.perSide - r.rest);
    h += '<p class="muted" style="text-align:center; font-size:12.5px; margin-top:6px">⚠️ '+fmtKg(kg)+' kg ist mit Standard-Scheiben nicht exakt steckbar – nächstmöglich: <b style="color:var(--text)">'+fmtKg(achievable)+' kg</b>.</p>';
  }
  out.innerHTML = h;
}

function awSet(ei, si, field, val){
  state.active.entries[ei].sets[si][field] = num(val);
  save();
}
function awToggleDone(ei, si){
  const st = state.active.entries[ei].sets[si];
  st.done = !st.done;
  save(); renderActiveWorkout();
  if(st.done && (state.profile.restSec||0) > 0) startRest(state.profile.restSec);
}
function awAddSet(ei){
  const sets = state.active.entries[ei].sets;
  const lastSet = sets[sets.length-1];
  sets.push({kg:lastSet?lastSet.kg:0, reps:lastSet?lastSet.reps:0, done:false});
  save(); renderActiveWorkout();
}
function awRemoveSet(ei, si){
  state.active.entries[ei].sets.splice(si,1);
  save(); renderActiveWorkout();
}
function awAddExercise(id){
  const e = getExercise(id);
  if(!e) return;
  state.active.entries.push({exId:id, name:e.name, sets:[{kg:lastKgFor(id), reps:10, done:false}]});
  save();
  document.getElementById("workout-overlay").classList.add("open");
  renderActiveWorkout();
}
function awRemoveExercise(ei){
  state.active.entries.splice(ei,1);
  save(); renderActiveWorkout();
}
function finishWorkout(){
  const aw = state.active;
  const entries = aw.entries.map(e=>({exId:e.exId, name:e.name,
      sets:e.sets.filter(s=>s.done && (s.reps||0)>0).map(s=>({kg:s.kg||0, reps:s.reps||0}))}))
    .filter(e=>e.sets.length);
  if(!entries.length){
    if(confirm("Keine Sätze abgehakt (✓). Workout verwerfen?")) cancelWorkout(true);
    return;
  }
  const durationMin = Math.max(1, Math.round((Date.now()-aw.start)/60000));
  const prs = detectPRs(entries); // vor dem Speichern: Vergleich nur gegen bisherige Historie
  const sess = {id:"s-"+uid(), date:todayStr(), name:aw.name, start:aw.start, durationMin, entries};
  state.sessions.push(sess);
  state.active = null;
  save();
  if(awTimer){ clearInterval(awTimer); awTimer = null; }
  stopRest();
  document.getElementById("workout-overlay").classList.remove("open");
  updateAwBar();
  renderTab(currentTab);
  toast("💪 Workout gespeichert: "+entries.length+" Übungen, "+r0(sessionVolume(sess)).toLocaleString("de-DE")+" kg Volumen");
  showWorkoutSummary(sess, prs);
}
function cancelWorkout(silent){
  if(!silent && !confirm("Workout wirklich abbrechen? Eingetragene Sätze gehen verloren.")) return;
  state.active = null;
  save();
  if(awTimer){ clearInterval(awTimer); awTimer = null; }
  stopRest();
  document.getElementById("workout-overlay").classList.remove("open");
  updateAwBar();
  renderTab(currentTab);
}

/* ---------- Workout-Zusammenfassung & Share-Card (rein abgeleitet, keine Speicheränderung) ---------- */
let _lastShare = null;   // PRs des zuletzt beendeten Workouts (flüchtig, nur für die Share-Card)
function sessionSetCount(s){ let n = 0; for(const e of s.entries) n += e.sets.length; return n; }
function bestSetOf(e){
  let best = null;
  for(const st of e.sets) if(!best || (st.kg||0) > (best.kg||0) || ((st.kg||0) === (best.kg||0) && (st.reps||0) > (best.reps||0))) best = st;
  return best;
}
function showWorkoutSummary(sess, prs){

function buildShareCard(s, prs){
  const W = 1080, H = 1350;
  const c = document.createElement("canvas"); c.width = W; c.height = H;
  const x = c.getContext("2d");
  function rr(px,py,w,h,r){
    x.beginPath();
    x.moveTo(px+r,py);
    x.arcTo(px+w,py,px+w,py+h,r);
    x.arcTo(px+w,py+h,px,py+h,r);
    x.arcTo(px,py+h,px,py,r);
    x.arcTo(px,py,px+w,py,r);
    x.closePath();
  }
  const bg = x.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#0b0e16"); bg.addColorStop(0.55,"#151329"); bg.addColorStop(1,"#221347");
  x.fillStyle = bg; x.fillRect(0,0,W,H);
  function glow(cx,cy,r,col){
    const g = x.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,col); g.addColorStop(1,"rgba(11,14,22,0)");
    x.fillStyle = g; x.fillRect(cx-r,cy-r,r*2,r*2);
  }
  glow(W*0.88, H*0.10, 430, "rgba(168,85,247,0.30)");
  glow(W*0.08, H*0.92, 500, "rgba(99,102,241,0.26)");
  const F = 'Sora, Inter, system-ui, sans-serif';
  x.fillStyle = "#a78bfa"; x.font = "700 34px "+F;
  x.fillText("F I T T R A C K", 84, 140);
  x.fillStyle = "#f4f4f8"; x.font = "700 76px "+F;
  x.fillText(s.name.length>22 ? s.name.slice(0,21)+"…" : s.name, 84, 244);
  x.fillStyle = "#9aa0b4"; x.font = "500 34px "+F;
  x.fillText(fmtDate(s.date)+"  ·  "+(s.durationMin||0)+" min", 84, 304);
  const stats = [
    [r0(sessionVolume(s)).toLocaleString("de-DE"), "KG VOLUMEN"],
    [String(sessionSetCount(s)), "SÄTZE"],
    [String(s.entries.length), "ÜBUNGEN"]
  ];
  const bw = (W - 168 - 48) / 3;
  stats.forEach(function(st, i){
    const bx = 84 + i*(bw+24);
    x.fillStyle = "rgba(255,255,255,0.06)"; rr(bx, 356, bw, 170, 26); x.fill();
    x.strokeStyle = "rgba(255,255,255,0.12)"; x.lineWidth = 2; rr(bx, 356, bw, 170, 26); x.stroke();
    x.textAlign = "center";
    x.fillStyle = "#f4f4f8"; x.font = "700 52px "+F;
    x.fillText(st[0], bx+bw/2, 440);
    x.fillStyle = "#9aa0b4"; x.font = "600 22px "+F;
    x.fillText(st[1], bx+bw/2, 490);
    x.textAlign = "left";
  });
  let y = 620;
  x.fillStyle = "#9aa0b4"; x.font = "600 26px "+F;
  x.fillText("WORKOUT", 84, y); y += 24;
  x.strokeStyle = "rgba(255,255,255,0.12)"; x.lineWidth = 2;
  x.beginPath(); x.moveTo(84, y); x.lineTo(W-84, y); x.stroke(); y += 58;
  const maxRows = (prs && prs.length) ? 5 : 8;
  const shown = s.entries.slice(0, maxRows);
  for(const e of shown){
    const b = bestSetOf(e);
    x.fillStyle = "#e7e9f0"; x.font = "600 36px "+F;
    x.fillText(e.name.length>24 ? e.name.slice(0,23)+"…" : e.name, 84, y);
    if(b){
      x.textAlign = "right";
      x.fillStyle = "#a78bfa"; x.font = "700 36px "+F;
      x.fillText(fmtKg(b.kg||0)+" kg × "+(b.reps||0), W-84, y);
      x.textAlign = "left";
    }
    y += 62;
  }
  if(s.entries.length > shown.length){
    x.fillStyle = "#9aa0b4"; x.font = "500 30px "+F;
    x.fillText("+ "+(s.entries.length - shown.length)+" weitere Übungen", 84, y);
    y += 62;
  }
  if(prs && prs.length){
    y += 10;
    for(const p of prs.slice(0,3)){
      x.fillStyle = "#fbbf24"; x.font = "600 32px "+F;
      const t = "🏆 "+p;
      x.fillText(t.length>46 ? t.slice(0,45)+"…" : t, 84, y);
      y += 52;
    }
  }
  x.fillStyle = "#8b5cf6"; x.font = "700 30px "+F;
  x.fillText("💪 Getrackt mit FitTrack", 84, H-84);
  return c;
}
function shareWorkout(id){
  const s = state.sessions.find(w=>w.id===id);
  if(!s){ toast("Workout nicht gefunden"); return; }
  const prs = (_lastShare && _lastShare.id===id) ? _lastShare.prs : [];
  buildShareCard(s, prs).toBlob(async function(blob){
    if(!blob){ toast("Bild konnte nicht erstellt werden"); return; }
    const fname = "fittrack-workout-"+s.date+".png";
    try{
      if(navigator.share && navigator.canShare){
        const file = new File([blob], fname, {type:"image/png"});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:"FitTrack Workout", text:"Mein Workout – getrackt mit FitTrack 💪"});
          return;
        }
      }
    }catch(e){ if(e && e.name==="AbortError") return; }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 4000);
    toast("📤 Share-Card heruntergeladen – bereit zum Teilen");
  }, "image/png");
}

/* ---------- Aktivitäts-Heatmap (GitHub-Stil, rein abgeleitet – keine neuen Speicherdaten) ---------- */
function dayHeatInfo(ds){
  const d = state.diary[ds];               // bewusst ohne getDay(): legt keine leeren Tage an
  const parts = [];
  let meals = 0;
  if(d && d.meals) for(const k in d.meals) meals += (d.meals[k]||[]).length;
  if(meals) parts.push(meals===1 ? "1 Lebensmittel" : meals+" Lebensmittel");
  const wk = state.sessions.filter(s=>s.date===ds).length;
  if(wk) parts.push(wk===1 ? "1 Workout" : wk+" Workouts");
  if(d && d.water) parts.push(d.water+" Gl. Wasser");
  if(d && d.steps) parts.push(d.steps.toLocaleString("de-DE")+" Schritte");
  const acts = d && d.activities ? d.activities.length : 0;
  if(acts) parts.push(acts===1 ? "1 Aktivität" : acts+" Aktivitäten");
  let lvl = 0;
  if(meals) lvl++;
  if((d && (d.water || d.steps)) || acts) lvl++;
  if(wk) lvl += 2;
  return {lvl:Math.min(4,lvl), parts};
}
function heatTap(ds){
  const info = dayHeatInfo(ds);
  toast(fmtDate(ds)+": "+(info.parts.length ? info.parts.join(" · ") : "keine Einträge"));
}
const HEAT_WEEKS = 16;
function heatmapHtml(){
  const today = todayStr();
  const mon = mondayOf(today);
  const MN = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  let months = "", cells = "", active = 0, total = 0, lastM = -1;
  for(let w=HEAT_WEEKS-1; w>=0; w--){
    const wMon = addDays(mon, -7*w);
    const m = new Date(wMon+"T12:00:00").getMonth();
    months += '<span>'+(m!==lastM ? MN[m] : "")+'</span>';
    lastM = m;
    for(let i=0;i<7;i++){
      const ds = addDays(wMon, i);
      if(ds > today){ cells += '<i class="hmf" aria-hidden="true"></i>'; continue; }
      const info = dayHeatInfo(ds);
      total++;
      if(info.lvl>0) active++;
      const tip = fmtDate(ds)+(info.parts.length ? ": "+info.parts.join(" · ") : ": keine Einträge");
      cells += '<i class="hm'+info.lvl+(ds===today?' hmt':'')+'" role="img" tabindex="0" title="'+esc(tip)+'" aria-label="'+esc(tip)+'" onclick="heatTap(\''+ds+'\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();heatTap(\''+ds+'\')}"></i>';
    }
  }
  return '<div class="heatwrap"><div class="heatmonths">'+months+'</div>'
    + '<div class="heatgrid">'+cells+'</div></div>'
    + '<div class="row between" style="margin-top:9px"><span class="muted" style="font-size:12px">'+active+' von '+total+' Tagen aktiv</span>'
    + '<span class="heatlegend">Weniger <i class="hm0"></i><i class="hm1"></i><i class="hm2"></i><i class="hm3"></i><i class="hm4"></i> Mehr</span></div>';
}

/* ---------- Muskel-Balance (letzte 4 Wochen, rein abgeleitet – keine neuen Speicherdaten) ---------- */
const MUSCLE_ORDER = ["Brust","Rücken","Schultern","Bizeps","Trizeps","Bauch","Beine","Po","Ganzkörper","Cardio","Sonstiges"];
function muscleSplit(days){
  const from = addDays(todayStr(), -(days-1));
  const counts = {};
  let total = 0;
  for(const s of state.sessions){
    if(s.date < from) continue;
    for(const e of s.entries){
      const ex = getExercise(e.exId);
      const m = (ex && ex.muscle) ? ex.muscle : "Sonstiges";
      const n = (e.sets||[]).length;
      if(!n) continue;
      counts[m] = (counts[m]||0) + n;
      total += n;
    }
  }
  return {counts, total};
}
function muscleCardHtml(){
  const ms = muscleSplit(28);
  let h = '<div class="card"><div class="cardhead"><span class="cicon">💪</span><h3>Muskel-Balance</h3><span class="muted">letzte 4 Wochen</span></div>';
  if(!ms.total){
    return h + emptyState('💪','Noch keine Workouts in den letzten 4 Wochen','Schließe ein Workout ab – hier siehst du dann, wie sich deine Sätze auf die Muskelgruppen verteilen.') + '</div>';
  }
  const groups = MUSCLE_ORDER.filter(m=>ms.counts[m])
    .concat(Object.keys(ms.counts).filter(m=>!MUSCLE_ORDER.includes(m)).sort());
  const max = Math.max.apply(null, groups.map(m=>ms.counts[m]));
  for(const m of groups){
    const c = ms.counts[m], pct = Math.round(c/ms.total*100);
    h += '<div class="mbrow"><span class="mbl" title="'+esc(m)+'">'+esc(m)+'</span>'
      + '<div class="mbtrack" role="img" aria-label="'+esc(m)+': '+c+' Sätze, '+pct+' Prozent"><div class="mbfill" style="width:'+Math.max(4, Math.round(c/max*100))+'%"></div></div>'
      + '<span class="mbv">'+c+' '+(c===1?"Satz":"Sätze")+' · '+pct+'%</span></div>';
  }
  const core = ["Brust","Rücken","Schultern","Beine"];
  const missing = core.filter(m=>!ms.counts[m]);
  if(missing.length && missing.length < core.length){
    h += '<p class="muted" style="font-size:12px; margin-top:12px">💡 In den letzten 4 Wochen nicht trainiert: '+missing.join(", ")+' – vielleicht beim nächsten Workout einplanen?</p>';
  }
  return h + '</div>';
}

    + heatmapHtml() + '</div>';

  // Erfolgs-Badges
  const badges = badgeList(), got = badges.filter(b=>b.earned).length;
  html += '<div class="card"><div class="cardhead"><span class="cicon">🏅</span><h3>Erfolge</h3><span class="muted">'+got+' / '+badges.length+'</span></div><div class="badgegrid">';

    html += '<div class="badge '+(b.earned?"earned":"locked")+'">'

    + '</div>';

  // Gewicht
  const ws = state.weights.slice().sort((a,b)=>a.date.localeCompare(b.date));
  html += '<div class="card"><div class="row between"><h3>⚖️ Körpergewicht</h3>'
    + '<button class="btn small" onclick="openWeightModal()">＋ Eintragen</button></div>';
  if(ws.length>=2){
    const diff = ws[ws.length-1].kg - ws[0].kg;
    html += '<p class="muted">Aktuell: <b style="color:var(--text)">'+r1(ws[ws.length-1].kg)+' kg</b> · Veränderung gesamt: '+(diff>0?"+":"")+r1(diff)+' kg</p>';
    html += lineChart(ws.slice(-30).map(w=>({x:w.date, y:w.kg})), state.profile.targetWeight);
  } else if(ws.length===1){
    html += '<p class="muted">Aktuell: <b style="color:var(--text)">'+r1(ws[0].kg)+' kg</b> – trage regelmäßig ein, um den Verlauf zu sehen.</p>';
  } else {
    html += emptyState('⚖️','Noch kein Gewicht eingetragen','Tippe auf „＋ Eintragen“ – ab zwei Einträgen siehst du hier deinen Verlauf als Kurve.');
  }
  // Zielgewicht: Fortschrittsbalken + Trend-Prognose (additiv, nur wenn gesetzt)
  html += weightGoalHtml(ws);
  if(ws.length){
    html += '<details style="margin-top:8px"><summary class="muted" style="cursor:pointer; font-size:13px">Alle Einträge</summary>';
    for(let i=ws.length-1;i>=0;i--){
      html += '<div class="fooditem"><span>'+fmtDate(ws[i].date)+'</span><b style="font-size:13px">'+r1(ws[i].kg)+' kg</b>'
        + '<button class="del" onclick="deleteWeight(\''+ws[i].date+'\')" aria-label="Gewichtseintrag löschen">🗑</button></div>';
    }
    html += '</details>';
  }
  html += '</div>';

  // Körpermaße
  html += measureCardHtml();

  // Kalorien letzte 7 Tage
  const days = [];
  for(let i=6;i>=0;i--){
    const ds = addDays(todayStr(), -i);
    days.push({label:["So","Mo","Di","Mi","Do","Fr","Sa"][new Date(ds+"T12:00:00").getDay()], val:dayTotals(ds).kcal});
  }
  html += '<div class="card"><h3>🍽 Kalorien – letzte 7 Tage</h3>'
    + barChart(days, state.profile.kcalTarget) + '</div>';

  // Trainingsvolumen pro Woche
  const weeks = [];
  for(let i=7;i>=0;i--){
    const monday = mondayOf(addDays(todayStr(), -7*i));
    const end = addDays(monday, 6);
    let vol = 0, cnt = 0;
    for(const s of state.sessions) if(s.date>=monday && s.date<=end){ vol += sessionVolume(s); cnt++; }
    const d = new Date(monday+"T12:00:00");
    weeks.push({label:d.getDate()+"."+(d.getMonth()+1)+".", val:vol, cnt});
  }
  const wkTotal = state.sessions.length;
  html += '<div class="card"><h3>🏋️ Trainingsvolumen pro Woche (kg)</h3>'
    + barChart(weeks, null)
    + '<p class="muted" style="margin-top:6px">'+wkTotal+' Workouts insgesamt aufgezeichnet.</p></div>';

  // Muskel-Balance (Sätze pro Muskelgruppe, letzte 4 Wochen)
  html += muscleCardHtml();

  // Daten
  html += '<div class="card"><h3>💾 Daten</h3><p class="muted">Alle Daten liegen nur lokal in diesem Browser.</p>'
    + '<div class="row" style="margin-top:10px">'
    + '<button class="btn ghost grow" onclick="exportData()">Export (JSON)</button>'
    + '<button class="btn ghost grow" onclick="document.getElementById(\'import-file\').click()">Import</button></div>'
    + '<button class="btn ghost full" style="margin-top:9px" onclick="exportDiaryCSV()">📄 Ernährungstagebuch als CSV</button>'
    + '<button class="btn ghost full" style="margin-top:9px" onclick="exportBodyCSV()">📊 Körperdaten als CSV (Gewicht + Maße)</button>'
    + '<p class="muted" style="font-size:11.5px; margin-top:7px">CSV lässt sich in Excel oder Google Sheets öffnen.</p>'
    + '<input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)"></div>';

  document.getElementById("view-progress").innerHTML = html;
}

/* ---------- Zielgewicht & Trend-Prognose (additiv: profile.targetWeight) ---------- */
function weightTrend(ws){
  // Lineare Regression (kleinste Quadrate) über die Einträge der letzten 42 Tage,
  // Fallback: letzte 5 Einträge. Liefert {perWeek} in kg/Woche oder null.
  if(ws.length<2) return null;
  const cutoff = addDays(todayStr(), -42);
  let pts = ws.filter(w=>w.date>=cutoff);
  if(pts.length<2) pts = ws.slice(-5);
  if(pts.length<2) return null;
  const t0 = new Date(pts[0].date+"T12:00:00").getTime();
  const xs = pts.map(w=>(new Date(w.date+"T12:00:00").getTime()-t0)/86400000);
  if(xs[xs.length-1]-xs[0] < 2) return null; // zu kurzer Zeitraum für eine seriöse Schätzung
  const n = pts.length;
  const mx = xs.reduce((a,b)=>a+b,0)/n, my = pts.reduce((a,w)=>a+w.kg,0)/n;
  let nu = 0, de = 0;
  for(let i=0;i<n;i++){ nu += (xs[i]-mx)*(pts[i].kg-my); de += (xs[i]-mx)*(xs[i]-mx); }
  if(de===0) return null;
  return { perWeek: nu/de*7 };
}
function weightGoalHtml(ws){
  const t = state.profile.targetWeight;
  if(typeof t !== "number" || !(t>0)){
    return ws.length ? '<button class="btn ghost full" style="margin-top:10px" onclick="openTargetModal()">🎯 Zielgewicht festlegen</button>' : '';
  }
  const cur = ws.length ? ws[ws.length-1].kg : state.profile.weight;
  const start = ws.length ? ws[0].kg : cur;
  const rest = t - cur;
  let pct;
  if(Math.abs(start-t) > 0.05) pct = Math.max(0, Math.min(100, (start-cur)/(start-t)*100));
  else pct = Math.abs(rest)<=0.05 ? 100 : 0;
  const tr = weightTrend(ws);
  let trendTxt;
  if(Math.abs(rest) <= 0.3){
    trendTxt = '🎉 Ziel erreicht – stark! Passe dein Ziel an oder halte dein Gewicht.';
  } else if(!tr){
    trendTxt = 'Trage regelmäßig dein Gewicht ein – dann schätzt FitTrack hier, wann du dein Ziel erreichst.';
  } else {
    const pw = tr.perWeek;
    const pwTxt = (pw>=0?'+':'−') + r1(Math.abs(pw)) + ' kg/Woche';
    if(Math.abs(pw) < 0.05){
      trendTxt = 'Trend: stabil (±0 kg/Woche). Für dein Ziel braucht es eine kleine Anpassung bei Ernährung oder Training.';
    } else if(pw*rest > 0){
      const days = Math.round(Math.abs(rest/(pw/7)));
      trendTxt = days <= 730
        ? 'Trend: '+pwTxt+' · bei diesem Tempo erreichst du dein Ziel voraussichtlich am <b style="color:var(--text)">'+fmtDate(addDays(todayStr(), days))+'</b>.'
        : 'Trend: '+pwTxt+' – aktuell sehr langsam. Kleine Anpassungen bei Ernährung oder Training beschleunigen den Fortschritt.';
    } else {
      trendTxt = 'Trend: '+pwTxt+' – gerade in die andere Richtung. Bleib dran, dein Ziel ist weiter erreichbar.';
    }
  }
  return '<div class="goalbox">'
    + '<div class="row between"><span class="muted" style="font-weight:600; font-size:13px">🎯 Ziel: <b style="color:var(--text)">'+r1(t)+' kg</b>'
    + (Math.abs(rest)>0.3 ? ' · noch '+(rest>0?'+':'')+r1(rest)+' kg' : '')+'</span>'
    + '<button class="iconbtn" style="width:30px; height:30px; font-size:13px; border-radius:10px" onclick="openTargetModal()" aria-label="Zielgewicht ändern">✎</button></div>'
    + '<div class="goalbar" role="progressbar" aria-valuenow="'+r0(pct)+'" aria-valuemin="0" aria-valuemax="100" aria-label="Fortschritt zum Zielgewicht"><i style="width:'+r1(pct)+'%"></i></div>'
    + '<p class="muted" style="font-size:12.5px; margin-top:7px; margin-bottom:0">'+trendTxt+'</p>'
    + '</div>';
}

    + '<label>Zielgewicht (kg)</label><input type="number" id="tw-kg" step="0.1" min="1" inputmode="decimal" value="'+(typeof t==="number"?r1(t):"")+'" placeholder="z. B. 75">'
