/* ---------- Körpermaße (additiv: state.measures) ---------- */
const MEAS_FIELDS = [
  {k:"waist", label:"Taille"},
  {k:"chest", label:"Brust"},
  {k:"hips",  label:"Hüfte"},
  {k:"arm",   label:"Oberarm"},
  {k:"thigh", label:"Oberschenkel"}
];
let measureSel = null; // im Chart gewählte Messgröße (nicht persistiert)

function sortedMeasures(){ return (state.measures||[]).slice().sort((a,b)=>a.date.localeCompare(b.date)); }
function measureSeries(key){ return sortedMeasures().filter(m=>m[key]>0).map(m=>({x:m.date, y:m[key]})); }

function measureCardHtml(){
  const ms = sortedMeasures();
  let html = '<div class="card"><div class="row between"><h3>📏 Körpermaße</h3>'
    + '<button class="btn small" onclick="openMeasureModal()">＋ Messung</button></div>';
  if(!ms.length){
    return html + emptyState('📏','Noch keine Maße eingetragen','Tippe auf „＋ Messung“ – Taille, Brust, Hüfte, Oberarm, Oberschenkel. Jedes Feld ist optional.') + '</div>';
  }
  html += '<div class="statgrid" style="margin-top:10px; margin-bottom:0">';
  for(const f of MEAS_FIELDS){
    const ser = measureSeries(f.k);
    if(!ser.length) continue;
    const last = ser[ser.length-1];
    let delta = "";
    if(ser.length>1){
      const d = r1(last.y - ser[ser.length-2].y);
      if(d!==0) delta = ' <small style="font-size:11px; font-weight:600">('+(d>0?"+":"")+d+')</small>';
    }
    html += '<div class="stat"><b>'+r1(last.y)+'<small style="font-size:12px"> cm</small>'+delta+'</b><span>'+f.label+'</span></div>';
  }
  html += '</div>';
  const chartable = MEAS_FIELDS.filter(f=>measureSeries(f.k).length>=2);
  if(chartable.length){
    if(!measureSel || !chartable.some(f=>f.k===measureSel)) measureSel = chartable[0].k;
    html += '<div class="chips" style="margin-top:12px; margin-bottom:0">'
      + chartable.map(f=>'<button class="chip'+(f.k===measureSel?" on":"")+'" onclick="setMeasureSel(\''+f.k+'\')">'+f.label+'</button>').join("")
      + '</div>' + lineChart(measureSeries(measureSel).slice(-30));
  } else {
    html += '<p class="muted" style="margin-top:10px; font-size:13px">Ab zwei Messungen derselben Stelle siehst du hier deinen Verlauf als Kurve.</p>';
  }
  html += '<details style="margin-top:8px"><summary class="muted" style="cursor:pointer; font-size:13px">Alle Messungen</summary>';
  for(let i=ms.length-1;i>=0;i--){
    const m = ms[i];
    const parts = MEAS_FIELDS.filter(f=>m[f.k]>0).map(f=>f.label+" "+r1(m[f.k]));
    html += '<div class="fooditem"><span>'+fmtDate(m.date)+'</span><b style="font-size:12.5px">'+parts.join(" · ")+' cm</b>'
      + '<button class="del" onclick="deleteMeasure(\''+m.date+'\')" aria-label="Messung löschen">🗑</button></div>';
  }
  html += '</details></div>';
  return html;
}
function setMeasureSel(k){ measureSel = k; renderProgress(); }
function openMeasureModal(){
  const lastVal = k => { const s = measureSeries(k); return s.length ? r1(s[s.length-1].y) : ""; };
  let html = '<h3>📏 Körpermaße eintragen</h3>'
    + '<p class="muted" style="font-size:13px; margin-top:4px">Alle Angaben in cm – leere Felder werden übersprungen.</p>'
    + '<label>Datum</label><input type="date" id="m-date" value="'+todayStr()+'">';
  for(const f of MEAS_FIELDS){
    html += '<label>'+f.label+' (cm)</label><input type="number" id="m-'+f.k+'" step="0.1" min="0" inputmode="decimal" placeholder="'+(lastVal(f.k)!==""?("zuletzt "+lastVal(f.k)):"–")+'">';
  }
  html += '<button class="btn full" style="margin-top:14px" onclick="saveMeasure()">Speichern</button>';
  openModal(html);
}
function saveMeasure(){
  const ds = document.getElementById("m-date").value;
  if(!ds){ toast("Bitte Datum angeben"); return; }
  const entry = {date:ds};
  let any = false;
  for(const f of MEAS_FIELDS){
    const v = num(document.getElementById("m-"+f.k).value);
    if(v>0){ entry[f.k] = v; any = true; }
  }
  if(!any){ toast("Bitte mindestens ein Maß eingeben"); return; }
  const old = state.measures.find(m=>m.date===ds);
  if(old) Object.assign(old, entry);
  else state.measures.push(entry);
  save(); closeModal(); renderProgress(); toast("Maße gespeichert ✓");
}
function deleteMeasure(ds){
  const idx = state.measures.findIndex(m=>m.date===ds);
  if(idx<0) return;
  const m = state.measures.splice(idx,1)[0];
  save(); renderProgress();
  toastUndo('Messung gelöscht', function(){
    state.measures.splice(Math.min(idx, state.measures.length), 0, m);
    save(); if(currentTab==="progress") renderProgress();
  });
}
function exportBodyCSV(){
  const csvCell = v => { const s = String(v==null?"":v).replace(/"/g,'""'); return /[";\n]/.test(s) ? '"'+s+'"' : s; };
  const rows = [["Datum","Gewicht (kg)","Taille (cm)","Brust (cm)","Huefte (cm)","Oberarm (cm)","Oberschenkel (cm)"]];
  const byDate = {};
  for(const w of state.weights){ (byDate[w.date] = byDate[w.date]||{}).kg = w.kg; }
  for(const m of state.measures){ const o = byDate[m.date] = byDate[m.date]||{}; for(const f of MEAS_FIELDS){ if(m[f.k]>0) o[f.k] = m[f.k]; } }
  const dates = Object.keys(byDate).sort();
  for(const ds of dates){
    const o = byDate[ds];
    rows.push([ds, o.kg!=null?r1(o.kg):"", ...MEAS_FIELDS.map(f=>o[f.k]!=null?r1(o[f.k]):"")]);
  }
  if(rows.length===1){ toast("Noch keine Körperdaten zum Exportieren"); return; }
  const csv = "﻿" + rows.map(r=>r.map(csvCell).join(";")).join("\r\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fittrack-koerperdaten-"+todayStr()+".csv";
  a.click();
  URL.revokeObjectURL(a.href);
  toast("CSV heruntergeladen ✓ ("+(rows.length-1)+" Tage)");
}

/* ---------- Charts (SVG) ---------- */
let chartN = 0;
function lineChart(pts, target){
  if(pts.length<2) return "";
  const W=560, H=190, P=30;
  const id = "lc"+(chartN++);
  const ys = pts.map(p=>p.y);
  let min = Math.min(...ys), max = Math.max(...ys);
  if(typeof target==="number" && target>0){ min = Math.min(min, target); max = Math.max(max, target); }
  if(max-min<2){ min-=1; max+=1; }
  const pad = (max-min)*0.1; min-=pad; max+=pad;
  const X = i => P + i*(W-2*P)/(pts.length-1);
  const Y = v => H-P - (v-min)*(H-2*P)/(max-min);
  const path = pts.map((p,i)=>(i?"L":"M")+r1(X(i))+","+r1(Y(p.y))).join(" ");
  const area = path + " L"+r1(X(pts.length-1))+","+(H-P)+" L"+r1(X(0))+","+(H-P)+" Z";
  const dots = pts.map((p,i)=>'<circle cx="'+r1(X(i))+'" cy="'+r1(Y(p.y))+'" r="3.6" fill="#a78bfa" stroke="var(--card-solid)" stroke-width="1.5"/>').join("");
  const first = pts[0], lastp = pts[pts.length-1];
  let tline = "";
  if(typeof target==="number" && target>0){
    const ty = r1(Y(target));
    const tly = ty<20 ? ty+15 : ty-6; // Label unter die Linie, wenn sie am oberen Rand liegt
    tline = '<line x1="'+P+'" y1="'+ty+'" x2="'+(W-P)+'" y2="'+ty+'" stroke="var(--green)" stroke-width="1.5" stroke-dasharray="6 5" opacity=".75"/>'
      + '<text x="'+P+'" y="'+tly+'" fill="var(--green)" font-size="10.5" font-weight="600">Ziel '+r1(target)+'</text>';
  }
  return '<svg class="chart" viewBox="0 0 '+W+' '+H+'">'
    + '<defs><linearGradient id="'+id+'a" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.32"/><stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/></linearGradient>'
    + '<linearGradient id="'+id+'l" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#c084fc"/></linearGradient></defs>'
    + tline
    + '<path d="'+area+'" fill="url(#'+id+'a)"/>'
    + '<path d="'+path+'" fill="none" stroke="url(#'+id+'l)" stroke-width="2.5" stroke-linecap="round"/>' + dots
    + '<text x="'+P+'" y="'+(H-6)+'" fill="var(--muted)" font-size="11">'+fmtDate(first.x)+'</text>'
    + '<text x="'+(W-P)+'" y="'+(H-6)+'" fill="var(--muted)" font-size="11" text-anchor="end">'+fmtDate(lastp.x)+'</text>'
    + '<text x="'+(X(pts.length-1)-8)+'" y="'+(Y(lastp.y)-10)+'" fill="var(--text)" font-size="12" font-weight="600" text-anchor="end">'+r1(lastp.y)+'</text>'
    + '</svg>';
}
function barChart(items, targetLine){
  const W=560, H=170, P=24, gap=10;
  const id = "bc"+(chartN++);
  const bw = (W-2*P)/items.length - gap;
  const inner = H-2*P-14;
  let max = Math.max(...items.map(i=>i.val), targetLine||0, 1) * 1.12;
  let bars = "", labels = "";
  items.forEach((it,i)=>{
    const x = P + i*((W-2*P)/items.length) + gap/2;
    const h = it.val/max*inner;
    const y = H-P-14-h;
    const over = targetLine && it.val>targetLine;
    bars += '<rect x="'+r1(x)+'" y="'+P+'" width="'+r1(bw)+'" height="'+inner+'" rx="6" fill="var(--card2)"/>';
    bars += '<rect x="'+r1(x)+'" y="'+r1(y)+'" width="'+r1(bw)+'" height="'+r1(Math.max(h,2))+'" rx="6" fill="'+(over?"var(--red)":"url(#"+id+")")+'"/>';
    if(it.val>0) bars += '<text x="'+r1(x+bw/2)+'" y="'+r1(y-5)+'" fill="var(--muted)" font-size="10" text-anchor="middle">'+r0(it.val).toLocaleString("de-DE")+'</text>';
    labels += '<text x="'+r1(x+bw/2)+'" y="'+(H-P+10)+'" fill="var(--muted)" font-size="10" text-anchor="middle">'+it.label+'</text>';
  });
  let tl = "";
  if(targetLine){
    const y = H-P-14 - targetLine/max*inner;
    tl = '<line x1="'+P+'" y1="'+r1(y)+'" x2="'+(W-P)+'" y2="'+r1(y)+'" stroke="var(--green)" stroke-width="1.5" stroke-dasharray="5,4"/>'
       + '<text x="'+(W-P)+'" y="'+r1(y-4)+'" fill="var(--green)" font-size="10" text-anchor="end">Ziel '+r0(targetLine)+'</text>';
  }
  return '<svg class="chart" viewBox="0 0 '+W+' '+H+'">'
    + '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#6366f1"/></linearGradient></defs>'
    + bars + labels + tl + '</svg>';
}

/* ---------- Export / Import ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fittrack-backup-"+todayStr()+".json";
  a.click();
  URL.revokeObjectURL(a.href);
  toast("Backup heruntergeladen ✓");
}
function exportDiaryCSV(){
  const csvCell = v => { const s = String(v==null?"":v).replace(/"/g,'""'); return /[";\n]/.test(s) ? '"'+s+'"' : s; };
  const rows = [["Datum","Mahlzeit","Lebensmittel","Menge (g/ml)","kcal","Eiweiss (g)","KH (g)","Fett (g)"]];
  const dates = Object.keys(state.diary).sort();
  for(const ds of dates){
    const d = state.diary[ds];
    if(!d || !d.meals) continue;
    for(const mk of Object.keys(MEALS)){
      for(const e of (d.meals[mk]||[])){
        const g = e.grams||0;
        rows.push([ds, MEALS[mk], e.name, g,
          r0(e.kcal*g/100), r1(e.p*g/100), r1(e.c*g/100), r1(e.f*g/100)]);
      }
    }
  }
  if(rows.length === 1){ toast("Noch keine Mahlzeiten zum Exportieren"); return; }
  const csv = "﻿" + rows.map(r=>r.map(csvCell).join(";")).join("\r\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fittrack-ernaehrung-"+todayStr()+".csv";
  a.click();
  URL.revokeObjectURL(a.href);
  toast("CSV heruntergeladen ✓ ("+(rows.length-1)+" Einträge)");
}
function importData(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const d = JSON.parse(reader.result);
      if(!d.profile || !d.diary) throw new Error("ungültig");
      if(!confirm("Aktuelle Daten mit dem Backup überschreiben?")) return;
      state = d; save();
      renderTab(currentTab); updateAwBar();
      toast("Daten importiert ✓");
    }catch(e){ toast("Import fehlgeschlagen – ungültige Datei"); }
  };
  reader.readAsText(file);
  input.value = "";
}

function calcTDEE(){
  const gender = document.getElementById("pf-gender").value;
  const age = num(document.getElementById("pf-age").value);
  const h = num(document.getElementById("pf-height").value);
  const w = num(document.getElementById("pf-weight").value);
  const act = num(document.getElementById("pf-activity").value);
  if(age<=0||h<=0||w<=0){ toast("Bitte Alter, Größe und Gewicht ausfüllen"); return; }
  const bmr = 10*w + 6.25*h - 5*age + (gender==="m"?5:-161);   // Mifflin-St Jeor
  const tdee = bmr*act;
  document.getElementById("tdee-result").innerHTML =
    '<div style="background:var(--card2); border-radius:12px; padding:12px; margin-top:12px; font-size:13px">'
    + '<div class="row between"><span class="muted">Grundumsatz (BMR)</span><b>'+r0(bmr)+' kcal</b></div>'
    + '<div class="row between" style="margin-top:4px"><span class="muted">Gesamtumsatz (TDEE)</span><b>'+r0(tdee)+' kcal</b></div>'
    + '<p class="muted" style="margin:10px 0 6px">Als Ziel übernehmen:</p>'
    + '<div class="row">'
    + '<button class="btn small ghost grow" onclick="applyTarget('+r0(tdee-400)+')">Abnehmen<br>'+r0(tdee-400)+'</button>'
    + '<button class="btn small ghost grow" onclick="applyTarget('+r0(tdee)+')">Halten<br>'+r0(tdee)+'</button>'
    + '<button class="btn small ghost grow" onclick="applyTarget('+r0(tdee+300)+')">Aufbauen<br>'+r0(tdee+300)+'</button>'
    + '</div></div>';
}

function saveProfile(){

/* ---------- Undo-Toast (Löschen rückgängig machen) ---------- */
let _undoFn = null;
function toastUndo(msg, undoFn){
  const t = document.getElementById("toast");
  _undoFn = function(){
    _undoFn = null;
    t.classList.remove("show");
    undoFn();
    setTimeout(function(){ toast("Wiederhergestellt ✓"); }, 150);
  };
  t.innerHTML = esc(msg) + '<button class="undo" onclick="_undoFn && _undoFn()">Rückgängig</button>';
  t.classList.add("show");
  clearTimeout(t._h);
  t._h = setTimeout(function(){ t.classList.remove("show"); _undoFn = null; }, 6000);
}

function deleteRecipe(id){

  toastUndo('Rezept „'+rec.name+'" gelöscht', function(){
    state.recipes.splice(Math.min(idx, state.recipes.length), 0, rec);

    if(e2 && foodModal.tab==="recipes") renderRecipeTab(e2);
  });

/* ---------- Schnellauswahl: zuletzt verwendete Lebensmittel ---------- */
let recentCache = [];
function recentFoods(){
  const seen = {}, out = [];
  const days = Object.keys(state.diary).sort().reverse().slice(0,30);
  for(const ds of days){
    const d = state.diary[ds];
    if(!d || !d.meals) continue;
    for(const mk of Object.keys(MEALS)){
      const list = d.meals[mk]||[];
      for(let i=list.length-1; i>=0; i--){
        const e = list[i];
        const k = (e.name+"|"+(e.brand||"")).toLowerCase();
        if(seen[k]) continue;
        seen[k] = 1;
        out.push({name:e.name, brand:e.brand||"", kcal:e.kcal, p:e.p, c:e.c, f:e.f, grams:e.grams});
        if(out.length>=10) return out;
      }
    }
  }
  return out;
}
function recentFoodsHtml(){
  recentCache = recentFoods();
  if(!recentCache.length) return "";
  return '<div class="muted" style="font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; margin:2px 2px 6px">🕘 Zuletzt verwendet</div>'
    + recentCache.map((f,i)=>'<div class="pick-item" onclick="selectRecentFood('+i+')"><div><b>'+esc(f.name)+'</b>'
      + '<div class="sub">'+(f.brand && f.brand!=="Speise" ? esc(f.brand)+' · ' : '')+r0(f.kcal)+' kcal/100 g · zuletzt '+r0(f.grams)+' g</div></div>'
      + '<span class="muted">＋</span></div>').join("")
    + '<div class="muted" style="font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; margin:12px 2px 6px">Alle Lebensmittel</div>';
}
function selectRecentFood(i){
  const f = recentCache[i];
  if(!f) return;
  foodModal.selected = Object.assign({}, f);
  renderFoodTabBody();
}

function saveAiKey(){
  const v = document.getElementById("ai-key-in").value.trim();
  if(!v){ toast("Bitte Schlüssel eingeben"); return; }
  localStorage.setItem(AI_KEY_STORE, v);
  toast("Schlüssel lokal gespeichert ✓");
  renderAiScan();
}
function clearAiKey(){ localStorage.removeItem(AI_KEY_STORE); renderAiScan(); }
function aiPhotoChosen(inp){
  const file = inp.files && inp.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = function(){
    const max = 1024, sc = Math.min(1, max/Math.max(img.width, img.height));
    const c = document.createElement("canvas");
    c.width = Math.max(1, Math.round(img.width*sc));
    c.height = Math.max(1, Math.round(img.height*sc));
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    aiScan.photo = c.toDataURL("image/jpeg", 0.8);
    aiScan.err = null;
    URL.revokeObjectURL(img.src);
    renderAiScan();
  };
  img.onerror = function(){ aiScan.err = "Bild konnte nicht gelesen werden."; URL.revokeObjectURL(img.src); renderAiScan(); };
  img.src = URL.createObjectURL(file);
}
async function aiAnalyze(){
  if(!aiScan.photo || aiScan.busy) return;
  aiScan.busy = true; aiScan.err = null;
  renderAiScan();
  try{
    const key = localStorage.getItem(AI_KEY_STORE)||"";
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "content-type": "application/json",
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5",
        max_tokens: 1200,
        messages: [{role:"user", content:[
          {type:"image", source:{type:"base64", media_type:"image/jpeg", data: aiScan.photo.split(",")[1]}},
          {type:"text", text:"Erkenne alle Lebensmittel und Gerichte auf diesem Foto. Schätze für jedes Element die sichtbare Portionsmenge in Gramm sowie die Nährwerte PRO 100 g: kcal, Protein (p), Kohlenhydrate (c) und Fett (f) in Gramm. Verwende deutsche Namen. Antworte AUSSCHLIESSLICH mit JSON in genau diesem Format, ohne weiteren Text: {\"items\":[{\"name\":\"Spaghetti Bolognese\",\"grams\":350,\"kcal\":130,\"p\":7,\"c\":14,\"f\":4.5}]} Wenn kein Essen erkennbar ist, antworte mit {\"items\":[]}."}
        ]}]
      })
    });
    if(!res.ok){
      if(res.status===401 || res.status===403) throw new Error("API-Schlüssel ungültig oder abgelaufen – über ‚Key ändern' neu eingeben.");
      if(res.status===429) throw new Error("Zu viele Anfragen – bitte kurz warten und erneut versuchen.");
      throw new Error("KI-Dienst nicht erreichbar (Fehler "+res.status+").");
    }
    const data = await res.json();
    const txt = (data.content||[]).map(b=>b.text||"").join("");
    const m = txt.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(m ? m[0] : txt);
    const items = (parsed.items||[]).slice(0,12).map(it=>({
      on: true,
      name: String(it.name||"Unbekannt").slice(0,60),
      grams: Math.max(1, Math.round(+it.grams||100)),
      kcal: Math.max(0, Math.round((+it.kcal||0)*10)/10),
      p: Math.max(0, Math.round((+it.p||0)*10)/10),
      c: Math.max(0, Math.round((+it.c||0)*10)/10),
      f: Math.max(0, Math.round((+it.f||0)*10)/10)
    })).filter(it=>it.kcal>0 || it.name!=="Unbekannt");
    if(items.length) aiScan.items = items;
    else aiScan.err = "Die KI konnte kein Essen erkennen – probiere ein anderes Foto (gutes Licht, Essen gut sichtbar).";
  }catch(e){
    aiScan.err = e && e.message ? e.message : "Analyse fehlgeschlagen – Internetverbindung prüfen.";
  }
  aiScan.busy = false;
  renderAiScan();
}
function updAiSum(){
  const el = document.getElementById("ai-sum");
  if(!el || !aiScan.items) return;
  let sum = 0;
  for(const it of aiScan.items) if(it.on) sum += it.kcal*it.grams/100;
  el.textContent = r0(sum);
}
function aiScanConfirm(){
  const chosen = (aiScan.items||[]).filter(it=>it.on);
  if(!chosen.length){ toast("Nichts ausgewählt"); return; }

/* ---------- PWA-Basics: App-Icons per Canvas (kein Base64 nötig, App bleibt eine Datei) ---------- */
function makeAppIcon(size){
  const c = document.createElement("canvas"); c.width = c.height = size;
  const x = c.getContext("2d"), s = size/100;
  function rrect(px,py,w,h,r){
    px*=s; py*=s; w*=s; h*=s; r*=s;
    x.beginPath();
    x.moveTo(px+r,py);
    x.arcTo(px+w,py,px+w,py+h,r);
    x.arcTo(px+w,py+h,px,py+h,r);
    x.arcTo(px,py+h,px,py,r);
    x.arcTo(px,py,px+w,py,r);
    x.closePath(); x.fill();
  }
  const g = x.createLinearGradient(0,0,size,size);
  g.addColorStop(0,"#6366f1"); g.addColorStop(1,"#a855f7");
  x.fillStyle = g; rrect(0,0,100,100,22.5);
  x.fillStyle = "#fff";
  rrect(30,45.5,40,9,4);   /* Hantel-Stange */
  rrect(26,30,9,40,4.2);   /* innere Scheiben */
  rrect(65,30,9,40,4.2);
  rrect(17,36,8,28,3.8);   /* äußere Scheiben */
  rrect(75,36,8,28,3.8);
  return c.toDataURL("image/png");
}

/* ---------- Higgsfield-Motion: nahtlose Video-Loops (Crossfade, kein harter Neustart) ---------- */
const MOTION_AURORA = {url:"https://d8j0ntlcm91z4.cloudfront.net/user_3GMT9fk0c3IKefA5uuWe4H5fLoG/hf_20260713_110833_6ba7f022-0b3d-4232-8562-1517a2be74e4.mp4",
                       poster:"https://d8j0ntlcm91z4.cloudfront.net/user_3GMT9fk0c3IKefA5uuWe4H5fLoG/hf_20260713_100241_f64321be-e1bf-463a-881c-8707a223433a.png"};
const MOTION_HERO   = {url:"https://d8j0ntlcm91z4.cloudfront.net/user_3GMT9fk0c3IKefA5uuWe4H5fLoG/hf_20260713_110555_d09604fb-d90b-46ab-ab08-b277c7d5c76c.mp4",
                       poster:"https://d8j0ntlcm91z4.cloudfront.net/user_3GMT9fk0c3IKefA5uuWe4H5fLoG/hf_20260713_100228_a269e990-aece-4ada-b845-1f94c739671c.png"};
let _motionPlayers = [], _heroPlayer = null, heroMotionEl = null;

async function makeLoopPlayer(wrap, media){
  const FADE = 1.1;                                     // Sekunden Ueberblendung
  const vids = [];
  for(let i=0;i<2;i++){
    const v = document.createElement("video");
    v.muted = true; v.playsInline = true; v.preload = "auto";
    v.setAttribute("playsinline",""); v.setAttribute("muted","");
    v.poster = media.poster;                            // bis zum Laden zeigt das Poster das statische Bild
    v.setAttribute("aria-hidden","true"); v.tabIndex = -1;
    wrap.appendChild(v); vids.push(v);
  }
  vids[0].classList.add("on");
  let blobUrl;
  try{                                                  // Video per fetch laden: EIN Download, beide
    const res = await fetch(media.url);                 // Crossfade-Elemente teilen sich den Blob -> der
    if(!res.ok) throw new Error("HTTP "+res.status);    // Loop-Uebergang ruckelt nie durch Nachladen
    blobUrl = URL.createObjectURL(await res.blob());
  }catch(e){ return null; }                             // Fallback: statisches Posterbild bleibt stehen
  vids.forEach(function(v){ v.src = blobUrl; });
  let act = 0, switching = false;
  function tryPlay(v){ const p = v.play(); if(p && p.catch) p.catch(function(){}); }
  function swap(){                                      // weicher Crossfade zum zweiten Video
    if(switching) return;
    switching = true;
    const cur = vids[act], nxt = vids[1-act];
    nxt.currentTime = 0; tryPlay(nxt);
    nxt.classList.add("on"); cur.classList.remove("on");
    setTimeout(function(){ cur.pause(); act = 1-act; switching = false; }, FADE*1000+80);
  }
  vids.forEach(function(v){
    v.addEventListener("timeupdate", function(){
      if(v===vids[act] && v.duration && v.currentTime >= v.duration - FADE - 0.15) swap();
    });
    v.addEventListener("ended", function(){ if(v===vids[act]) swap(); });  // Sicherheitsnetz
  });
  tryPlay(vids[0]);
  const player = {
    vids,
    resume(){ tryPlay(vids[act]); if(switching) tryPlay(vids[1-act]); },
    pause(){ vids.forEach(function(v){ v.pause(); }); }
  };
  _motionPlayers.push(player);
  return player;
}
function attachHeroMotion(){                            // Hero-Video ueberlebt Dashboard-Re-Render
  if(!heroMotionEl) return;
  const hero = document.querySelector("#view-dashboard .hero");
  if(hero && heroMotionEl.parentNode !== hero){
    hero.prepend(heroMotionEl);                         // synchroner DOM-Umzug -> spielt weiter
    if(_heroPlayer) _heroPlayer.resume();
  }
}
function setupMotion(){
  try{
    if(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches) return;  // Barrierefreiheit
    if(navigator.connection && navigator.connection.saveData) return;                        // Datensparmodus
    if(!document.createElement("video").canPlayType) return;
    document.documentElement.classList.add("motion");
    // 1) Aurora-Hintergrund (nur im Dark Mode sichtbar, per CSS gesteuert)
    const bg = document.createElement("div");
    bg.id = "bg-motion"; bg.setAttribute("aria-hidden","true");
    document.body.appendChild(bg);
    makeLoopPlayer(bg, MOTION_AURORA);
    // 2) Hero-Animation am Dashboard (persistentes Element)
    heroMotionEl = document.createElement("div");
    heroMotionEl.id = "hero-motion"; heroMotionEl.setAttribute("aria-hidden","true");
    makeLoopPlayer(heroMotionEl, MOTION_HERO).then(function(p){ _heroPlayer = p; if(p) p.resume(); });
    const shade = document.createElement("div"); shade.className = "hm-shade";
    heroMotionEl.appendChild(shade);                    // Verlauf liegt UEBER den Videos
    attachHeroMotion();
    document.addEventListener("visibilitychange", function(){  // Akku schonen
      _motionPlayers.forEach(function(p){ if(document.hidden) p.pause(); else p.resume(); });
    });
  }catch(e){ /* Motion ist optional - statische Bilder bleiben als Fallback */ }
}
